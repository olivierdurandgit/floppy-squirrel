<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Floppy Squirrel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #6e7378;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #wrap {
    position: relative;
    box-shadow: 0 10px 40px rgba(0,0,0,.35);
    border-radius: 8px;
    overflow: hidden;
  }
  canvas {
    display: block;
    background: linear-gradient(#9fa9ad 0%, #b9b2a3 55%, #c9c1ac 70%, #8a8470 70%, #6e6a58 100%);
    touch-action: none;
    cursor: pointer;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-align: center;
    background: rgba(0,0,0,.25);
    text-shadow: 0 2px 4px rgba(0,0,0,.5);
    transition: opacity .2s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #overlay h1 { font-size: 30px; margin-bottom: 8px; letter-spacing: 1px; }
  #overlay p { font-size: 16px; margin: 4px 0; }
  #overlay .big { font-size: 48px; font-weight: bold; margin: 6px 0; }
  #overlay .hint {
    margin-top: 18px;
    font-size: 14px;
    background: rgba(255,255,255,.2);
    padding: 8px 16px;
    border-radius: 20px;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse { 0%,100% { transform: scale(1);} 50% { transform: scale(1.08);} }
  #pauseBtn {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 5;
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 50%;
    background: rgba(0,0,0,.45);
    color: #fff;
    font-size: 18px;
    line-height: 40px;
    cursor: pointer;
    display: none;
    padding: 0;
    transition: background .15s;
  }
  #pauseBtn:hover { background: rgba(0,0,0,.65); }
  #homeBtn {
    position: absolute;
    left: 50%;
    top: 60%;
    transform: translateX(-50%);
    z-index: 6;
    border: none;
    border-radius: 22px;
    background: rgba(255,255,255,.92);
    color: #333;
    font-size: 16px;
    font-weight: bold;
    padding: 10px 22px;
    cursor: pointer;
    display: none;
    transition: background .15s;
  }
  #homeBtn:hover { background: #fff; }
  #customize {
    position: absolute;
    inset: 0;
    z-index: 8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(20,24,28,.82);
    color: #fff;
    text-align: center;
  }
  #customize.hidden { display: none; }
  #customize h2 { font-size: 24px; }
  #preview {
    background: linear-gradient(#9fa9ad, #c9c1ac);
    border-radius: 10px;
    box-shadow: 0 4px 14px rgba(0,0,0,.4);
  }
  #tabs {
    display: flex;
    gap: 6px;
  }
  .tab {
    border: none;
    border-radius: 16px;
    background: rgba(255,255,255,.18);
    color: #fff;
    font-size: 13px;
    padding: 7px 12px;
    cursor: pointer;
  }
  .tab.active { background: #fff; color: #222; font-weight: bold; }
  #shirtOptions {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    max-width: 320px;
    min-height: 44px;
  }
  .optIcon {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    border: 3px solid transparent;
    border-radius: 12px;
    background: rgba(255,255,255,.2);
    color: #fff;
    font-size: 11px;
    padding: 6px 8px;
    cursor: pointer;
  }
  .optIcon canvas { background: rgba(255,255,255,.12); border-radius: 6px; }
  .optIcon.selected { border-color: #fff; background: rgba(255,255,255,.35); font-weight: bold; }
  .optLbl { white-space: nowrap; }
  .swatch {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    position: relative;
    box-shadow: 0 2px 6px rgba(0,0,0,.4);
  }
  .swatch.selected { border-color: #fff; transform: scale(1.12); }
  .swatch.none {
    background: #fff;
    color: #c0392b;
    font-size: 22px;
    line-height: 34px;
    font-weight: bold;
  }
  #closeCustomize {
    margin-top: 6px;
    border: none;
    border-radius: 22px;
    background: #2ecc71;
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    padding: 10px 28px;
    cursor: pointer;
  }
  #closeCustomize:hover { background: #27ae60; }
  #customizeBtn, #deadHomeBtn {
    margin-top: 14px;
    border: none;
    border-radius: 22px;
    background: rgba(255,255,255,.9);
    color: #333;
    font-size: 15px;
    font-weight: bold;
    padding: 9px 20px;
    cursor: pointer;
  }
  #customizeBtn:hover, #deadHomeBtn:hover { background: #fff; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="400" height="600"></canvas>
  <button id="pauseBtn" aria-label="Pause">⏸</button>
  <button id="homeBtn">🏠 Accueil</button>
  <div id="customize" class="hidden">
    <h2>🎨 Personnalisation</h2>
    <canvas id="preview" width="180" height="130"></canvas>
    <div id="tabs">
      <button class="tab" data-tab="shirt">👕 T-shirt</button>
      <button class="tab" data-tab="hat">🎩 Chapeau</button>
      <button class="tab" data-tab="glasses">🕶️ Lunettes</button>
      <button class="tab" data-tab="socks">🧦 Chaussette</button>
    </div>
    <div id="shirtOptions"></div>
    <button id="closeCustomize">Valider</button>
  </div>
  <div id="overlay">
    <h1>🐿️ Floppy Squirrel</h1>
    <p>Clique ou appuie sur <b>Espace</b> pour planer</p>
    <p>Évite les obstacles  — chaque contact coûte une vie ❤️</p>
    <div class="hint">Clique pour commencer</div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
let ctx = canvas.getContext('2d');   // réassignable (utilisé aussi pour l'aperçu de personnalisation)
const overlay = document.getElementById('overlay');
const pauseBtn = document.getElementById('pauseBtn');
const homeBtn = document.getElementById('homeBtn');
const W = canvas.width, H = canvas.height;
let paused = false;

// --- Personnalisation : t-shirt de l'écureuil ---
const SHIRTS = [
  { name: 'Aucun',  color: null },
  { name: 'Rouge',  color: [231, 76, 60] },
  { name: 'Bleu',   color: [52, 152, 219] },
  { name: 'Vert',   color: [46, 204, 113] },
  { name: 'Jaune',  color: [241, 196, 15] },
  { name: 'Violet', color: [155, 89, 182] },
  { name: 'Rose',   color: [255, 111, 174] },
  { name: 'Noir',   color: [52, 52, 60] },
  { name: 'Blanc',  color: [245, 245, 245] }
];
const HATS = [
  { name: 'Aucun', type: null },
  { name: 'Melon', type: 'bowler' },
  { name: 'Anniversaire', type: 'party' },
  { name: 'Casquette', type: 'cap' },
  { name: 'Perruque', type: 'wig' }
];
const GLASSES = [
  { name: 'Aucune', type: null },
  { name: 'Soleil', type: 'sun' },
  { name: 'Rondes', type: 'round' },
  { name: '3D', type: '3d' }
];
const SOCKS = [
  { name: 'Aucune', color: null },
  { name: 'Rouge',  color: [231, 76, 60] },
  { name: 'Bleu',   color: [52, 152, 219] },
  { name: 'Vert',   color: [46, 204, 113] },
  { name: 'Jaune',  color: [241, 196, 15] },
  { name: 'Violet', color: [155, 89, 182] },
  { name: 'Rose',   color: [255, 111, 174] },
  { name: 'Blanc',  color: [245, 245, 245] },
  { name: 'Noir',   color: [40, 40, 46] }
];
let shirtIndex = Number(localStorage.getItem('floppyShirt') || 0);
let hatIndex = Number(localStorage.getItem('floppyHat') || 0);
let glassesIndex = Number(localStorage.getItem('floppyGlasses') || 0);
let socksIndex = Number(localStorage.getItem('floppySocks') || 0);
if (!(shirtIndex >= 0 && shirtIndex < SHIRTS.length)) shirtIndex = 0;
if (!(hatIndex >= 0 && hatIndex < HATS.length)) hatIndex = 0;
if (!(glassesIndex >= 0 && glassesIndex < GLASSES.length)) glassesIndex = 0;
if (!(socksIndex >= 0 && socksIndex < SOCKS.length)) socksIndex = 0;
function currentShirtColor() { return SHIRTS[shirtIndex].color; }
function currentHatType() { return HATS[hatIndex].type; }
function currentGlassesType() { return GLASSES[glassesIndex].type; }
function currentSocksColor() { return SOCKS[socksIndex].color; }

// --- Paramètres du jeu ---
const GRAVITY = 0.13;
const FLAP = -4.0;
const PIPE_W = 60;
const PIPE_GAP = 170;
const PIPE_INTERVAL = 145;     // cadence indicative de spawn (en frames)
const MIN_PIPE_DISTANCE = 240; // distance horizontale minimale entre deux piliers (px)
const BASE_SPEED = 1.6;        // vitesse de départ
const SPEED_FROM = 15;         // score à partir duquel la vitesse augmente
const DOUBLE_FROM = 100;       // score à partir duquel les points doublent
const MAX_SPEED = 6.0;         // vitesse maximale
const ACCEL = 0.03;            // gain de vitesse par point au-delà du seuil
let speed = BASE_SPEED;        // vitesse courante (dynamique)
let bgScroll = 0;              // défilement du décor d'arrière-plan (parallaxe)
const BG_PARALLAX = 0.4;      // le décor défile plus lentement que les obstacles
const GROUND_Y = H * 0.85;

const bird = { x: 90, y: H/2, r: 14, vy: 0, rot: 0 };
let birdScale = 1;             // taille de l'écureuil (grossit avec le burger, rétrécit aux sauts)
const BURGER_GROW = 0.8;       // grossissement par burger mangé
const MAX_SCALE = 2.4;         // taille max
const SHRINK_PER_FLAP = 0.12;  // rétrécissement à chaque saut
let pipes = [];
let mushrooms = [];        // champignons hallucinogènes
let tripUntil = 0;         // timestamp ms : fin de l'effet psychédélique
const MUSH_R = 11;
const TRIP_MS = 6000;      // durée de l'effet « couleurs partout »
let weights = [];          // burgers (alourdissent et ralentissent selon la taille)
const BOULET_R = 12;
let shields = [];          // items bouclier (bulle de protection)
let shieldHits = 0;        // utilisations restantes (se fissure après 1, disparaît après 2)
let shieldUntil = 0;       // timestamp ms : expiration du bouclier (4 s max)
const SHIELD_R = 12;
const SHIELD_USES = 2;     // nombre d'utilisations du bouclier
const SHIELD_MS = 4000;    // durée max du bouclier (même s'il reste des utilisations)
const SHIELD_BOUNCE = -7;  // rebond quand on touche le sol sous protection
function shieldActive() { return shieldHits > 0 && Date.now() < shieldUntil; }
// Effet burger lié à la TAILLE de l'écureuil : plus il est gros, plus c'est lent et lourd.
// En maigrissant (à chaque saut), la vitesse réaccélère et la gravité revient à la normale.
const SLOW_FLOOR = 0.45;   // vitesse minimale (quand l'écureuil est au plus gros)
const SLOW_PER_SCALE = 0.45; // ralentissement par unité de surtaille
const GRAV_PER_SCALE = 1.0;  // gravité ajoutée par unité de surtaille (saut inchangé)
let freeBirds = [];        // petits oiseaux à attraper (flottent entre les tuyaux)
let followers = [];        // petits oiseaux attrapés qui suivent le gros oiseau
let trail = [];            // historique des positions du gros oiseau (pour le suivi)
let pipeCount = 0;         // nombre de tuyaux générés
const SQUIRREL_SCALE = 0.62; // échelle visuelle des écureuils (collision inchangée)
const SMALL_R = 8;         // rayon des petits oiseaux
const FOLLOW_SPACING = 9;  // écart (en frames) entre chaque oiseau de la file
// palette de couleurs pour les petits oiseaux (corps, contour)
const SMALL_PALETTE = [
  { body: [231, 76, 60],  stroke: [192, 57, 43]  }, // rouge
  { body: [52, 152, 219], stroke: [41, 128, 185] }, // bleu
  { body: [46, 204, 113], stroke: [39, 174, 96]  }, // vert
  { body: [155, 89, 182], stroke: [142, 68, 173] }, // violet
  { body: [230, 126, 34], stroke: [211, 84, 0]   }, // orange
  { body: [255, 111, 174],stroke: [194, 24, 91]  }, // rose
  { body: [26, 188, 156], stroke: [22, 160, 133] }, // turquoise
  { body: [241, 196, 15], stroke: [243, 156, 18] }, // jaune
];
let smallColorIdx = 0;     // pour faire tourner les couleurs
let score = 0;
let best = Number(localStorage.getItem('flappyBest') || 0);
let frame = 0;
let state = 'ready'; // 'ready' | 'countdown' | 'play' | 'dead'
let countdownStart = 0;
const REPLAY_DELAY = 3000; // ms d'attente (compte à rebours) avant que la partie démarre
let deadAt = 0;
const DEAD_LOCK = 1000;    // ms pendant lesquelles le clic est ignoré après la mort
const MAX_LIVES = 3;
let lives = MAX_LIVES;
let invincibleUntil = 0;       // timestamp ms : invincibilité après avoir pris un dégât
const HIT_INVINCIBLE = 1100;   // durée d'invincibilité après contact avec la fumée (ms)
let nextLifeAt = 50;           // prochain palier de score qui donne une vie bonus
const LIFE_EVERY = 50;
// --- Décors « catastrophe » : tirés au hasard tous les 4 écureuils sauvés ---
const SCENE_EVERY = 4;                 // change de décor tous les 4 écureuils
const SCENES = ['forest', 'lake', 'factory']; // forêt coupée / désert (lac asséché) / usines
let scene = null;                      // décor actif (null = usines au début)
let nextSceneChange = SCENE_EVERY;
let fromScene = null;                  // décor qui sort pendant la transition
let toScene = null;                    // décor qui entre pendant la transition
let transStart = -99999;               // timestamp ms du début de la transition
const TRANSITION_MS = 700;             // durée du glissement entre décors

function reset() {
  bird.y = H/2; bird.vy = 0; bird.rot = 0;
  birdScale = 1;
  pipes = [];
  mushrooms = [];
  tripUntil = 0;
  weights = [];
  shields = [];
  shieldHits = 0;
  shieldUntil = 0;
  freeBirds = [];
  followers = [];
  trail = [];
  pipeCount = 0;
  smallColorIdx = 0;
  score = 0;
  frame = 0;
  lives = MAX_LIVES;
  invincibleUntil = 0;
  nextLifeAt = LIFE_EVERY;
  speed = BASE_SPEED;
  scene = SCENES[Math.floor(Math.random() * SCENES.length)]; // décor de départ aléatoire
  nextSceneChange = SCENE_EVERY;
  fromScene = toScene = null;
  transStart = -99999;
  paused = false;
  bgScroll = 0;
}

function togglePause() {
  if (state !== 'play') return;       // pause seulement en cours de partie
  paused = !paused;
  pauseBtn.textContent = paused ? '▶' : '⏸';
}

// retour à l'écran d'accueil depuis la pause
function goHome() {
  paused = false;
  pauseBtn.textContent = '⏸';
  state = 'ready';
  showReady();
}

// ---- Menu de personnalisation (t-shirt) ----
const customizeEl = document.getElementById('customize');
const previewCanvas = document.getElementById('preview');
const previewCtx = previewCanvas.getContext('2d');
const shirtOptionsEl = document.getElementById('shirtOptions');

let currentTab = 'shirt';

function drawPreview() {
  previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
  const saved = ctx;
  ctx = previewCtx;                 // drawSquirrel dessine sur le canvas d'aperçu
  ctx.save();
  ctx.translate(previewCanvas.width / 2 - 12, previewCanvas.height / 2 + 6);
  drawSquirrel(20, [150, 92, 50], [38, 24, 14], 0,
    currentShirtColor(), currentHatType(), currentGlassesType(), currentSocksColor());
  ctx.restore();
  ctx = saved;
}

function buildOptions() {
  shirtOptionsEl.innerHTML = '';
  // onglet actif
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === currentTab));

  if (currentTab === 'shirt' || currentTab === 'socks') {
    const list = currentTab === 'shirt' ? SHIRTS : SOCKS;
    const sel = currentTab === 'shirt' ? shirtIndex : socksIndex;
    const key = currentTab === 'shirt' ? 'floppyShirt' : 'floppySocks';
    list.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'swatch' + (s.color ? '' : ' none') + (i === sel ? ' selected' : '');
      el.title = s.name;
      if (s.color) el.style.background = `rgb(${s.color[0]},${s.color[1]},${s.color[2]})`;
      else el.textContent = '∅';
      el.addEventListener('click', () => {
        if (currentTab === 'shirt') shirtIndex = i; else socksIndex = i;
        localStorage.setItem(key, i);
        buildOptions(); drawPreview();
      });
      shirtOptionsEl.appendChild(el);
    });
  } else {
    const list = currentTab === 'hat' ? HATS : GLASSES;
    const sel = currentTab === 'hat' ? hatIndex : glassesIndex;
    list.forEach((o, i) => {
      const el = document.createElement('button');
      el.className = 'optIcon' + (i === sel ? ' selected' : '');
      const cv = document.createElement('canvas');
      cv.width = 48; cv.height = 40;
      renderAccessoryIcon(cv, currentTab, o.type);
      el.appendChild(cv);
      const lbl = document.createElement('span');
      lbl.className = 'optLbl';
      lbl.textContent = o.name;
      el.appendChild(lbl);
      el.addEventListener('click', () => {
        if (currentTab === 'hat') { hatIndex = i; localStorage.setItem('floppyHat', i); }
        else { glassesIndex = i; localStorage.setItem('floppyGlasses', i); }
        buildOptions(); drawPreview();
      });
      shirtOptionsEl.appendChild(el);
    });
  }
}

// Dessine un aperçu de l'accessoire (chapeau ou lunettes) dans un petit canvas
function renderAccessoryIcon(cv, kind, type) {
  const c = cv.getContext('2d');
  c.clearRect(0, 0, cv.width, cv.height);
  if (!type) {
    c.fillStyle = '#ccc';
    c.font = '20px Segoe UI, Arial';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText('∅', cv.width / 2, cv.height / 2);
    return;
  }
  const saved = ctx;
  ctx = c;
  ctx.save();
  const r = 13;
  if (kind === 'hat') {
    ctx.translate(cv.width / 2 - 1.35 * r, cv.height * 0.92 + 0.95 * r);
    drawHat(r, type);
  } else {
    ctx.translate(cv.width / 2 - 1.65 * r, cv.height / 2 + 0.42 * r);
    drawGlasses(r, type);
  }
  ctx.restore();
  ctx = saved;
}

function openCustomize() {
  overlay.classList.add('hidden');
  customizeEl.classList.remove('hidden');
  buildOptions();
  drawPreview();
}

document.querySelectorAll('.tab').forEach(t =>
  t.addEventListener('click', () => { currentTab = t.dataset.tab; buildOptions(); }));

function closeCustomize() {
  customizeEl.classList.add('hidden');
  showReady();
}
document.getElementById('closeCustomize').addEventListener('click', closeCustomize);

function spawnPipe() {
  const margin = 60;
  const top = margin + Math.random() * (GROUND_Y - PIPE_GAP - margin * 2);
  pipes.push({ x: W, top, passed: false, hitTop: false, hitBot: false, seed: Math.random() * 100, decor: scene });
  pipeCount++;
  // tous les 10 tuyaux : un petit oiseau à attraper, centré dans l'espace du tuyau
  if (pipeCount % 10 === 0) {
    const col = SMALL_PALETTE[smallColorIdx % SMALL_PALETTE.length];
    smallColorIdx++;
    freeBirds.push({
      x: W + PIPE_W / 2,
      y: top + PIPE_GAP / 2,
      baseY: top + PIPE_GAP / 2,
      phase: Math.random() * Math.PI * 2,
      body: col.body,
      stroke: col.stroke
    });
  }
  // item entre les colonnes (hors tuyaux à écureuil) : un seul à la fois
  if (pipeCount % 10 !== 0) {
    const itemY = top + PIPE_GAP * (0.3 + Math.random() * 0.4);
    if (Math.random() < 0.06) {
      // champignon hallucinogène
      mushrooms.push({ x: W + PIPE_W / 2, baseY: itemY, phase: Math.random() * Math.PI * 2 });
    } else if (Math.random() < 0.035) {
      // burger (plus rare) : ralentit + alourdit
      weights.push({ x: W + PIPE_W / 2, baseY: itemY, phase: Math.random() * Math.PI * 2 });
    } else if (Math.random() < 0.03) {
      // bouclier (3 %) : bulle de protection
      shields.push({ x: W + PIPE_W / 2, baseY: itemY, phase: Math.random() * Math.PI * 2 });
    }
  }
}

function flap() {
  if (paused) return;                  // pas de saut quand le jeu est en pause
  if (state === 'dead') {
    // verrou : on ne peut pas rejouer pendant 1 s après la mort
    if (Date.now() - deadAt < DEAD_LOCK) return;
    startCountdown();
  } else if (state === 'ready') {
    // le clic lance le compte à rebours ; la partie démarre après le délai
    startCountdown();
  } else if (state === 'countdown') {
    // on ignore les clics pendant l'attente
    return;
  } else if (state === 'play') {
    bird.vy = FLAP;
    // chaque saut fait rétrécir l'écureuil jusqu'à sa taille normale
    if (birdScale > 1) birdScale = Math.max(1, birdScale - SHRINK_PER_FLAP);
  }
}

function startCountdown() {
  reset();
  state = 'countdown';
  countdownStart = Date.now();
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h1>Prêt ?</h1>
    <div class="big" id="countNum">3</div>
    <p>La partie démarre…</p>`;
}

function showReady() {
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h1>🐿️ Floppy Squirrel</h1>
    <p>Clique ou appuie sur <b>Espace</b> pour planer</p>
    <p>Évite les obstacles 💨🪚 — chaque contact coûte une vie ❤️ (3 max)</p>
    <button id="customizeBtn">👕 Personnaliser</button>
    <div class="hint">Clique pour commencer</div>`;
  const cb = document.getElementById('customizeBtn');
  const open = (e) => { e.preventDefault(); e.stopPropagation(); openCustomize(); };
  cb.addEventListener('mousedown', open);
  cb.addEventListener('touchstart', open, { passive: false });
}

function showDead(cause) {
  const obstacleMsg = scene === 'forest'
    ? 'Floppy a fini en bûches'
    : scene === 'lake'
      ? 'Floppy s’est noyé dans le sable'
      : 'Floppy a inhalé trop de fumée';
  // messages dédiés si on meurt sous l'effet d'un item
  const msg = (Date.now() < tripUntil)
    ? 'Il vaut mieux éviter de manger certaines choses…'
    : (birdScale > 1)
      ? (cause === 'ground' ? 'Floppy a coulé comme une pierre' : 'Le burger a un peu trop alourdi Floppy')
      : (cause === 'ground' ? 'Floppy a mangé le sol' : obstacleMsg);
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h1>💥 Perdu !</h1>
    <p>${msg}</p>
    <p>Score</p>
    <div class="big">${score}</div>
    <p>Meilleur : ${best}</p>
    <button id="deadHomeBtn">🏠 Accueil</button>
    <div class="hint">Clique pour rejouer</div>`;
  const hb = document.getElementById('deadHomeBtn');
  const home = (e) => { e.preventDefault(); e.stopPropagation(); state = 'ready'; showReady(); };
  hb.addEventListener('mousedown', home);
  hb.addEventListener('touchstart', home, { passive: false });
}

// Gère le compte à rebours après le clic, puis lance la partie
function updateCountdown() {
  if (state !== 'countdown') return;
  const remaining = REPLAY_DELAY - (Date.now() - countdownStart);
  const num = document.getElementById('countNum');
  if (remaining > 0) {
    if (num) num.textContent = Math.ceil(remaining / 1000);
  } else {
    // démarrage de la partie
    state = 'play';
    overlay.classList.add('hidden');
    bird.vy = FLAP;
  }
}

// Contact avec la fumée : perd une vie ; mort si plus de vie
function takeHit() {
  lives--;
  invincibleUntil = Date.now() + HIT_INVINCIBLE;
  if (lives <= 0) { lives = 0; die('smoke'); }
}

// Le bouclier encaisse un coup (utilisation) ; petite invincibilité pour ne pas le vider d'un coup
function consumeShield() {
  shieldHits = Math.max(0, shieldHits - 1);
  invincibleUntil = Date.now() + HIT_INVINCIBLE;
}

function die(cause) {
  state = 'dead';
  deadAt = Date.now();   // verrou anti-clic de 1 s après la mort
  if (score > best) { best = score; localStorage.setItem('flappyBest', best); }
  showDead(cause);
}

function update() {
  if (state !== 'play') return;
  frame++;

  // surtaille due au burger (0 = taille normale) : plus l'écureuil est gros, plus il est lourd
  const oversize = Math.max(0, birdScale - 1);
  // gravité renforcée proportionnelle à la taille (force de saut inchangée)
  const grav = GRAVITY * (1 + oversize * GRAV_PER_SCALE);
  bird.vy += grav;
  bird.y += bird.vy;
  bird.rot = Math.max(-0.5, Math.min(1.2, bird.vy / 12));

  // Au-delà de 15 points : la vitesse augmente progressivement avec le score
  if (score >= SPEED_FROM) {
    speed = Math.min(MAX_SPEED, BASE_SPEED + (score - SPEED_FROM) * ACCEL);
  } else {
    speed = BASE_SPEED;
  }
  // ralentissement proportionnel à la taille : réaccélère au fur et à mesure que l'écureuil maigrit
  speed *= Math.max(SLOW_FLOOR, 1 - oversize * SLOW_PER_SCALE);
  // défilement du décor d'arrière-plan (parallaxe, plus lent que les obstacles)
  bgScroll += speed * BG_PARALLAX;
  // Au-delà de 100 points : chaque obstacle franchi rapporte 2 points au lieu de 1
  const pointsPerPipe = score >= DOUBLE_FROM ? 2 : 1;

  // Spawn d'un pilier seulement si le dernier est assez loin (distance minimale garantie)
  const lastPipe = pipes.length ? pipes[pipes.length - 1] : null;
  const dueByTime = frame % PIPE_INTERVAL === 0;
  const farEnough = !lastPipe || (W - lastPipe.x) >= MIN_PIPE_DISTANCE;
  if (!lastPipe || (dueByTime && farEnough)) spawnPipe();

  for (const p of pipes) {
    p.x -= speed;
    if (!p.passed && p.x + PIPE_W < bird.x) {
      p.passed = true;
      score += pointsPerPipe;
    }
  }
  pipes = pipes.filter(p => p.x + PIPE_W > -10);

  // rayon effectif (l'écureuil agrandi par le burger est plus gros donc plus exposé)
  const er = bird.r * birdScale;
  const shielded = shieldActive();             // bulle de protection active ? (utilisations + délai)
  const grace = Date.now() < invincibleUntil;  // courte invincibilité (anti-rebond)

  // Sol : mortel normalement, mais sous bouclier on rebondit (consomme une utilisation)
  if (bird.y + er > GROUND_Y) {
    if (shielded) { bird.y = GROUND_Y - er; bird.vy = SHIELD_BOUNCE; if (!grace) consumeShield(); }
    else { bird.y = GROUND_Y - er; lives = 0; die('ground'); }
  }
  if (bird.y - er < 0) { bird.y = er; bird.vy = 0; }

  // Obstacles : contact = perte de vie, sauf grâce ; le bouclier encaisse (consomme une utilisation)
  for (const p of pipes) {
    const inX = bird.x + er > p.x && bird.x - er < p.x + PIPE_W;
    const inTop = bird.y - er < p.top;
    const inBot = bird.y + er > p.top + PIPE_GAP;
    if (inX && (inTop || inBot)) {
      if (grace) { /* invincibilité en cours : on ignore */ }
      else if (shielded) { consumeShield(); }
      else takeHit();
      break;
    }
  }

  // Historique des positions du gros oiseau (pour le suivi en file)
  trail.unshift({ x: bird.x, y: bird.y });
  const maxTrail = (followers.length + 1) * FOLLOW_SPACING + 5;
  if (trail.length > maxTrail) trail.length = maxTrail;

  // Petits oiseaux libres : déplacement, ondulation, et capture
  const CAPTURE_MARGIN = 10;   // petite tolérance autour de l'écureuil
  for (const b of freeBirds) {
    b.x -= speed;
    b.y = b.baseY + Math.sin((frame + b.phase * 10) * 0.08) * 6;
    const dx = b.x - bird.x, dy = b.y - bird.y;
    if (Math.hypot(dx, dy) < bird.r + SMALL_R + CAPTURE_MARGIN) {
      b.captured = true;
      followers.push({ body: b.body, stroke: b.stroke }); // garde sa couleur
      score += 5;           // bonus de score à la capture
    }
  }
  freeBirds = freeBirds.filter(b => !b.captured && b.x + SMALL_R > -10);

  // Champignons hallucinogènes : déplacement, ondulation, et déclenchement du « trip »
  for (const m of mushrooms) {
    m.x -= speed;
    m.y = m.baseY + Math.sin((frame + m.phase * 10) * 0.07) * 7;
    if (Math.hypot(m.x - bird.x, m.y - bird.y) < bird.r + MUSH_R + 8) {
      m.eaten = true;
      tripUntil = Date.now() + TRIP_MS;   // couleurs partout pendant TRIP_MS
    }
  }
  mushrooms = mushrooms.filter(m => !m.eaten && m.x + MUSH_R > -10);

  // Boulets : déplacement, ondulation, et déclenchement du ralentissement
  for (const wgt of weights) {
    wgt.x -= speed;
    wgt.y = wgt.baseY + Math.sin((frame + wgt.phase * 10) * 0.06) * 5;
    if (Math.hypot(wgt.x - bird.x, wgt.y - bird.y) < bird.r * birdScale + BOULET_R + 8) {
      wgt.taken = true;
      // l'écureuil grossit : ralentit + alourdit, puis revient à la normale en maigrissant (sauts)
      birdScale = Math.min(MAX_SCALE, birdScale + BURGER_GROW);
    }
  }
  weights = weights.filter(wgt => !wgt.taken && wgt.x + BOULET_R > -10);

  // Boucliers : déplacement, ondulation, et activation de la protection
  for (const sh of shields) {
    sh.x -= speed;
    sh.y = sh.baseY + Math.sin((frame + sh.phase * 10) * 0.07) * 6;
    if (Math.hypot(sh.x - bird.x, sh.y - bird.y) < bird.r * birdScale + SHIELD_R + 8) {
      sh.taken = true;
      shieldHits = SHIELD_USES;          // bouclier à 2 utilisations…
      shieldUntil = Date.now() + SHIELD_MS; // …et 4 s max
    }
  }
  shields = shields.filter(sh => !sh.taken && sh.x + SHIELD_R > -10);

  // Vie bonus tous les 50 points
  while (score >= nextLifeAt) {
    lives++;
    nextLifeAt += LIFE_EVERY;
  }

  // Tous les 4 écureuils sauvés : nouveau décor qui glisse (jamais 2 fois le même d'affilée)
  while (followers.length >= nextSceneChange) {
    const choices = SCENES.filter(s => s !== scene);
    fromScene = scene;
    scene = choices[Math.floor(Math.random() * choices.length)];
    toScene = scene;
    transStart = Date.now();           // démarre le glissement
    nextSceneChange += SCENE_EVERY;
  }

  // Oiseaux qui suivent : file indienne derrière le gros oiseau (décalés vers la gauche),
  // avec une hauteur qui reprend la trajectoire passée du gros oiseau (effet ondulant)
  const SPACING_PX = 22;
  followers.forEach((f, i) => {
    f.x = bird.x - (i + 1) * SPACING_PX;
    const idx = Math.min((i + 1) * FOLLOW_SPACING, trail.length - 1);
    const t = trail[idx];
    f.y = t ? t.y : bird.y;
  });
}

// Une volute : empilement de bouffées de fumée grises translucides entre y0 et y1
function drawSmokeRegion(cx, y0, y1, seed) {
  const step = 16;
  ctx.save();
  for (let y = y0; y <= y1; y += step) {
    const k = (y - y0) / step;
    const swirl = Math.sin(k * 1.3 + seed) * 16 + Math.sin(frame * 0.03 + k * 0.7 + seed) * 6;
    const cxk = cx + swirl;
    const puffs = [
      { dx: 0,   r: 24, c: 'rgba(110,110,114,0.55)' },
      { dx: -10, r: 17, c: 'rgba(140,140,144,0.45)' },
      { dx: 12,  r: 19, c: 'rgba(95,95,100,0.50)' },
      { dx: 2,   r: 13, c: 'rgba(170,170,174,0.40)' }
    ];
    for (const pu of puffs) {
      ctx.fillStyle = pu.c;
      ctx.beginPath();
      ctx.arc(cxk + pu.dx, y, pu.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

// Un pilier de sable à la forme irrégulière (bouffées de sable empilées, comme la fumée mais opaque)
function drawSandColumn(cx, y0, y1, seed) {
  const top = Math.min(y0, y1), bot = Math.max(y0, y1);
  const step = 15;
  ctx.save();
  for (let y = top; y <= bot; y += step) {
    const k = (y - top) / step;
    // bord irrégulier : décalage horizontal déterministe par seed
    const bump = Math.sin(k * 1.1 + seed) * 11 + Math.sin(k * 0.5 + seed * 1.7) * 6;
    const cxk = cx + bump;
    const lobes = [
      { dx: 0,   r: 24, c: '#d8b568' },
      { dx: -14, r: 16, c: '#c79a52' },
      { dx: 14,  r: 17, c: '#e3c479' },
      { dx: 3,   r: 13, c: '#b98a45' }
    ];
    for (const l of lobes) {
      ctx.fillStyle = l.c;
      ctx.beginPath();
      ctx.arc(cxk + l.dx, y, l.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  // grains clairs épars
  ctx.fillStyle = 'rgba(255,240,200,0.55)';
  for (let i = 0; i < 22; i++) {
    const gx = cx - 22 + ((i * 53 + seed * 17) % 44);
    const gy = top + 6 + ((i * 97 + seed * 31) % Math.max(8, bot - top - 10));
    ctx.fillRect(gx, gy, 1.5, 1.5);
  }
  ctx.restore();
}

// Une tronçonneuse : moteur ancré au mur (baseY), lame + chaîne tendue vers tipY (le passage).
function drawChainsaw(cx, baseY, tipY) {
  const dir = tipY >= baseY ? 1 : -1;
  const L = Math.abs(tipY - baseY);
  ctx.save();
  ctx.translate(cx, baseY);
  ctx.scale(1, dir);            // dessine toujours « vers l'intérieur » (y positif)

  const barW = 20;
  const motorL = Math.min(54, L * 0.5);
  const barStart = motorL * 0.4;

  // lame (guide) argentée
  ctx.fillStyle = '#cfd3d6';
  ctx.strokeStyle = '#3a3a3a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(-barW / 2, barStart, barW, L - barStart, barW / 2);
  ctx.fill();
  ctx.stroke();
  // rainure centrale
  ctx.strokeStyle = '#9aa0a4';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, barStart + 6);
  ctx.lineTo(0, L - 8);
  ctx.stroke();

  // dents de la chaîne (le long des deux bords)
  ctx.fillStyle = '#2b2b2b';
  for (let y = barStart + 6; y < L - 6; y += 9) {
    ctx.beginPath();
    ctx.moveTo(-barW / 2, y); ctx.lineTo(-barW / 2 - 5, y + 2.5); ctx.lineTo(-barW / 2, y + 5);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(barW / 2, y); ctx.lineTo(barW / 2 + 5, y + 2.5); ctx.lineTo(barW / 2, y + 5);
    ctx.closePath(); ctx.fill();
  }

  // carter moteur (orange)
  ctx.fillStyle = '#e8731c';
  ctx.strokeStyle = '#9f4d10';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(-28, -8, 56, motorL + 8, 9);
  ctx.fill();
  ctx.stroke();
  // grilles d'aération
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  for (let i = 0; i < 3; i++) ctx.fillRect(-19 + i * 13, motorL * 0.35, 7, motorL * 0.4);
  // poignée
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.arc(0, motorL * 0.55, 19, Math.PI * 0.12, Math.PI * 0.88);
  ctx.stroke();

  ctx.restore();
}

function drawPipe(p) {
  const cx = p.x + PIPE_W / 2;
  if (p.decor === 'forest') {
    // décor forêt : tronçonneuses (haut = moteur au plafond, bas = moteur au sol)
    drawChainsaw(cx, -8, p.top);
    drawChainsaw(cx, GROUND_Y, p.top + PIPE_GAP);
  } else if (p.decor === 'lake') {
    // désert : piliers de sable
    drawSandColumn(cx, -10, p.top, p.seed);
    drawSandColumn(cx, GROUND_Y, p.top + PIPE_GAP, p.seed + 5);
  } else {
    // usines / début : volutes de fumée
    drawSmokeRegion(cx, -10, p.top, p.seed);
    drawSmokeRegion(cx, p.top + PIPE_GAP, GROUND_Y, p.seed + 5);
  }
}

// dessine le décor d'arrière-plan d'une scène donnée (sur le sol déjà tracé)
function drawSceneDecor(s) {
  if (s === 'forest') drawCutForest();
  else if (s === 'lake') drawDriedLake();
  else drawFactories();   // 'factory' ou null
}

// Mélange deux couleurs RGB ([r,g,b]) selon t (0 = c1, 1 = c2)
function mix(c1, c2, t) {
  const r = Math.round(c1[0] + (c2[0] - c1[0]) * t);
  const g = Math.round(c1[1] + (c2[1] - c1[1]) * t);
  const b = Math.round(c1[2] + (c2[2] - c1[2]) * t);
  return `rgb(${r},${g},${b})`;
}

// Dessine un écureuil volant (façon illustration) centré sur l'origine, orienté vers la droite.
// r = taille, bodyRgb/strokeRgb = couleur, dmg = grisaille (0 normal → 1 tout gris)
function drawSquirrel(r, bodyRgb, strokeRgb, dmg, shirt, hat, glasses, socks) {
  const grey = [110, 110, 110];
  const body = mix(bodyRgb, grey, dmg);
  const stroke = mix(strokeRgb, [60, 60, 60], dmg);
  const cream = mix([242, 230, 208], [205, 205, 205], dmg); // ventre / membrane / mèche
  ctx.lineWidth = Math.max(1.2, r * 0.13);
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';

  // léger battement pour l'effet de vol
  const flap = Math.sin(frame * 0.18) * 0.12;

  // ---- QUEUE touffue, recourbée vers le haut/arrière ----
  ctx.fillStyle = body;
  ctx.strokeStyle = stroke;
  ctx.beginPath();
  ctx.moveTo(-r * 0.8, r * 0.45);
  ctx.bezierCurveTo(-r * 2.9, r * 0.5, -r * 3.0, -r * 1.4, -r * 1.9, -r * (2.05 + flap));
  ctx.bezierCurveTo(-r * 1.2, -r * (2.4 + flap), -r * 0.7, -r * 1.95, -r * 1.05, -r * 1.45);
  ctx.bezierCurveTo(-r * 1.55, -r * 1.0, -r * 1.7, -r * 0.45, -r * 1.25, -r * 0.1);
  ctx.bezierCurveTo(-r * 1.0, r * 0.1, -r * 0.85, r * 0.3, -r * 0.8, r * 0.45);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // mèche claire à l'intérieur de la queue
  ctx.fillStyle = cream;
  ctx.beginPath();
  ctx.moveTo(-r * 1.0, r * 0.15);
  ctx.bezierCurveTo(-r * 2.25, r * 0.05, -r * 2.35, -r * 1.25, -r * 1.65, -r * (1.75 + flap));
  ctx.bezierCurveTo(-r * 1.35, -r * (1.95 + flap), -r * 1.15, -r * 1.6, -r * 1.35, -r * 1.25);
  ctx.bezierCurveTo(-r * 1.6, -r * 0.85, -r * 1.5, -r * 0.35, -r * 1.15, r * 0.0);
  ctx.closePath();
  ctx.fill();

  // ---- PATTE arrière étendue vers le bas/arrière ----
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.moveTo(-r * 0.7, r * 0.35);
  ctx.quadraticCurveTo(-r * 1.5, r * 0.9, -r * 1.85, r * 0.7);
  ctx.lineTo(-r * 1.95, r * 0.95);
  ctx.lineTo(-r * 1.7, r * 1.05);
  ctx.lineTo(-r * 1.75, r * 1.2);
  ctx.lineTo(-r * 1.5, r * 1.1);
  ctx.quadraticCurveTo(-r * 0.9, r * 0.95, -r * 0.3, r * 0.7);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // ---- MEMBRANE de vol (patagium) le long du flanc inférieur ----
  ctx.fillStyle = cream;
  ctx.beginPath();
  ctx.moveTo(r * 1.5, -r * 0.15);                       // près de l'épaule avant
  ctx.quadraticCurveTo(r * 0.5, r * 1.05, -r * 0.7, r * 0.55); // bord festonné jusqu'à la hanche
  ctx.quadraticCurveTo(-r * 0.2, r * 0.15, r * 0.9, r * 0.05);
  ctx.quadraticCurveTo(r * 1.3, r * 0.0, r * 1.5, -r * 0.15);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // ---- CORPS (dos brun, allongé) ----
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.ellipse(r * 0.05, -r * 0.1, r * 1.35, r * 0.78, -0.12, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // ventre crème
  ctx.fillStyle = cream;
  ctx.beginPath();
  ctx.ellipse(r * 0.55, r * 0.18, r * 0.95, r * 0.42, -0.12, 0, Math.PI * 2);
  ctx.fill();

  // ---- T-SHIRT (optionnel) : bande colorée sur le torse, limitée à la silhouette du corps ----
  if (shirt) {
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(r * 0.05, -r * 0.1, r * 1.35, r * 0.78, -0.12, 0, Math.PI * 2);
    ctx.clip();
    ctx.translate(r * 0.05, -r * 0.1);
    ctx.rotate(-0.12);
    ctx.fillStyle = `rgb(${shirt[0]},${shirt[1]},${shirt[2]})`;
    ctx.fillRect(-r * 0.78, -r * 0.95, r * 1.2, r * 1.9);   // corps du t-shirt
    ctx.fillStyle = 'rgba(0,0,0,0.16)';                      // ourlet du bas
    ctx.fillRect(-r * 0.78, r * 0.7, r * 1.2, r * 0.2);
    ctx.fillStyle = 'rgba(255,255,255,0.18)';               // léger reflet
    ctx.fillRect(-r * 0.78, -r * 0.95, r * 0.28, r * 1.9);
    ctx.restore();
  }

  // ---- PATTE avant tendue vers l'avant (haut-droite) ----
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.moveTo(r * 1.15, -r * 0.35);
  ctx.quadraticCurveTo(r * 2.0, -r * 0.75, r * 2.55, -r * 0.6);
  ctx.lineTo(r * 2.75, -r * 0.7);
  ctx.lineTo(r * 2.6, -r * 0.45);
  ctx.lineTo(r * 2.75, -r * 0.42);
  ctx.lineTo(r * 2.5, -r * 0.32);
  ctx.quadraticCurveTo(r * 1.9, -r * 0.2, r * 1.25, -r * 0.05);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // ---- TÊTE avec museau pointu ----
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.moveTo(r * 0.75, -r * 0.95);                     // haut du crâne
  ctx.quadraticCurveTo(r * 1.7, -r * 1.05, r * 1.95, -r * 0.45); // arrière/dessus jusqu'au front
  ctx.quadraticCurveTo(r * 2.5, -r * 0.2, r * 2.5, r * 0.05);    // museau pointu (nez)
  ctx.quadraticCurveTo(r * 2.15, r * 0.25, r * 1.7, r * 0.2);    // dessous du museau
  ctx.quadraticCurveTo(r * 1.0, r * 0.15, r * 0.7, -r * 0.3);    // joue → corps
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // joue / menton crème
  ctx.fillStyle = cream;
  ctx.beginPath();
  ctx.moveTo(r * 1.55, r * 0.2);
  ctx.quadraticCurveTo(r * 2.1, r * 0.22, r * 2.45, r * 0.05);
  ctx.quadraticCurveTo(r * 2.1, r * 0.28, r * 1.6, r * 0.3);
  ctx.closePath();
  ctx.fill();

  // ---- OREILLE (pointue, vers l'arrière du crâne) ----
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.moveTo(r * 1.15, -r * 0.95);
  ctx.lineTo(r * 1.2, -r * 1.6);
  ctx.lineTo(r * 1.6, -r * 1.0);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // ---- ŒIL ----
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(r * 1.65, -r * 0.42, r * 0.26, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = stroke; ctx.lineWidth = Math.max(0.8, r * 0.06);
  ctx.beginPath(); ctx.arc(r * 1.65, -r * 0.42, r * 0.26, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#1a1208';
  ctx.beginPath(); ctx.arc(r * 1.7, -r * 0.4, r * 0.15, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(r * 1.76, -r * 0.46, r * 0.05, 0, Math.PI * 2); ctx.fill();

  // ---- LUNETTES (optionnel) ----
  if (glasses) drawGlasses(r, glasses);

  // ---- NEZ ----
  ctx.fillStyle = '#3a261a';
  ctx.beginPath(); ctx.ellipse(r * 2.42, r * 0.02, r * 0.13, r * 0.1, 0, 0, Math.PI * 2); ctx.fill();

  // ---- MOUSTACHES ----
  ctx.strokeStyle = mix([90, 70, 55], [120, 120, 120], dmg);
  ctx.lineWidth = Math.max(0.6, r * 0.04);
  ctx.beginPath();
  ctx.moveTo(r * 2.25, r * 0.05); ctx.quadraticCurveTo(r * 2.9, r * 0.0, r * 3.25, r * 0.1);
  ctx.moveTo(r * 2.25, r * 0.12); ctx.quadraticCurveTo(r * 2.9, r * 0.2, r * 3.25, r * 0.35);
  ctx.moveTo(r * 2.2, r * 0.18); ctx.quadraticCurveTo(r * 2.8, r * 0.35, r * 3.1, r * 0.55);
  ctx.stroke();

  // ---- CHAUSSETTES (optionnel) : sur les pattes ----
  if (socks) drawSocks(r, socks);

  // ---- CHAPEAU (optionnel) : par-dessus la tête ----
  if (hat) drawHat(r, hat);

  // restaure les réglages de trait
  ctx.strokeStyle = stroke;
  ctx.lineWidth = Math.max(1.2, r * 0.13);
}

// Lunettes (coordonnées locales de l'écureuil, œil ~ (1.65r, -0.42r))
function drawGlasses(r, type) {
  const ex = r * 1.65, ey = r * -0.42, lr = r * 0.34;
  ctx.lineWidth = Math.max(1.2, r * 0.08);
  // branche vers l'oreille
  ctx.strokeStyle = '#222';
  ctx.beginPath();
  ctx.moveTo(ex - lr * 0.7, ey - lr * 0.3);
  ctx.lineTo(r * 1.1, ey - lr * 0.2);
  ctx.stroke();
  if (type === 'sun') {
    ctx.fillStyle = '#181c22';
    ctx.strokeStyle = '#000';
    ctx.beginPath(); ctx.arc(ex, ey, lr, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    // reflet
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = Math.max(1, r * 0.05);
    ctx.beginPath(); ctx.arc(ex, ey, lr * 0.6, Math.PI * 1.1, Math.PI * 1.5); ctx.stroke();
  } else if (type === '3d') {
    // verre cyan, monture rouge
    ctx.fillStyle = 'rgba(0,200,220,0.45)';
    ctx.strokeStyle = '#e23b3b';
    ctx.beginPath(); ctx.arc(ex, ey, lr, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  } else { // round (rondes, verres clairs)
    ctx.fillStyle = 'rgba(200,225,255,0.35)';
    ctx.strokeStyle = '#333';
    ctx.beginPath(); ctx.arc(ex, ey, lr, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  }
  // pont vers le museau
  ctx.strokeStyle = (type === '3d') ? '#e23b3b' : '#222';
  ctx.beginPath();
  ctx.moveTo(ex + lr * 0.85, ey + lr * 0.1);
  ctx.lineTo(ex + lr * 1.5, ey + lr * 0.25);
  ctx.stroke();
}

// Chaussettes (coordonnées locales) : sur la patte arrière et la patte avant
function drawSocks(r, color) {
  const c = `rgb(${color[0]},${color[1]},${color[2]})`;
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = Math.max(1, r * 0.06);
  // patte arrière (en bas à gauche)
  ctx.save();
  ctx.translate(-r * 1.7, r * 1.0);
  ctx.rotate(0.5);
  ctx.fillStyle = c;
  ctx.beginPath(); ctx.ellipse(0, 0, r * 0.4, r * 0.24, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillRect(-r * 0.4, -r * 0.24, r * 0.8, r * 0.08); // liseré du haut
  ctx.restore();
  // patte avant (en haut à droite)
  ctx.save();
  ctx.translate(r * 2.5, -r * 0.5);
  ctx.rotate(-0.5);
  ctx.fillStyle = c;
  ctx.beginPath(); ctx.ellipse(0, 0, r * 0.36, r * 0.22, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillRect(-r * 0.36, -r * 0.22, r * 0.72, r * 0.07);
  ctx.restore();
}

// Chapeau (coordonnées locales ; sommet du crâne ~ (1.35r, -1.0r))
function drawHat(r, type) {
  const hx = r * 1.35, hy = r * -0.95;
  ctx.lineWidth = Math.max(1, r * 0.07);
  if (type === 'bowler') {
    // chapeau melon noir
    ctx.fillStyle = '#23262b';
    ctx.strokeStyle = '#000';
    // bord
    ctx.beginPath();
    ctx.ellipse(hx, hy, r * 0.95, r * 0.2, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    // dôme
    ctx.beginPath();
    ctx.ellipse(hx, hy - r * 0.12, r * 0.6, r * 0.55, 0, Math.PI, 0);
    ctx.fill(); ctx.stroke();
    // ruban
    ctx.fillStyle = '#555';
    ctx.fillRect(hx - r * 0.6, hy - r * 0.12, r * 1.2, r * 0.12);
  } else if (type === 'party') {
    // chapeau d'anniversaire (cône à rayures + pompon)
    const baseY = hy - r * 0.05, apexY = hy - r * 1.5;
    ctx.fillStyle = '#ff5fa2';
    ctx.strokeStyle = '#c2185b';
    ctx.beginPath();
    ctx.moveTo(hx - r * 0.5, baseY);
    ctx.lineTo(hx + r * 0.5, baseY);
    ctx.lineTo(hx, apexY);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // rayures
    ctx.strokeStyle = '#ffe24a';
    ctx.lineWidth = Math.max(1.5, r * 0.1);
    for (let k = 1; k <= 3; k++) {
      const t = k / 4;
      ctx.beginPath();
      ctx.moveTo(hx - r * 0.5 * (1 - t), baseY + (apexY - baseY) * t);
      ctx.lineTo(hx + r * 0.5 * (1 - t), baseY + (apexY - baseY) * t);
      ctx.stroke();
    }
    // pompon
    ctx.fillStyle = '#ffe24a';
    ctx.beginPath(); ctx.arc(hx, apexY, r * 0.16, 0, Math.PI * 2); ctx.fill();
  } else if (type === 'cap') {
    // casquette (calotte + visière vers l'avant/droite)
    ctx.fillStyle = '#2980b9';
    ctx.strokeStyle = '#1c5980';
    ctx.beginPath();
    ctx.ellipse(hx, hy, r * 0.6, r * 0.5, 0, Math.PI, 0);
    ctx.fill(); ctx.stroke();
    // visière
    ctx.beginPath();
    ctx.ellipse(hx + r * 0.55, hy, r * 0.55, r * 0.16, 0, Math.PI * 1.1, Math.PI * 2.05);
    ctx.fill(); ctx.stroke();
    // bouton
    ctx.fillStyle = '#1c5980';
    ctx.beginPath(); ctx.arc(hx, hy - r * 0.48, r * 0.07, 0, Math.PI * 2); ctx.fill();
  } else if (type === 'wig') {
    // perruque bouclée colorée (amas de boucles)
    const cols = ['#8e44ad', '#e67e22', '#27ae60', '#2980b9', '#e74c3c'];
    const curls = [
      [hx - r * 0.7, hy - r * 0.1], [hx - r * 0.35, hy - r * 0.45], [hx, hy - r * 0.6],
      [hx + r * 0.4, hy - r * 0.45], [hx + r * 0.75, hy - r * 0.1],
      [hx - r * 0.55, hy + r * 0.2], [hx + r * 0.6, hy + r * 0.2], [hx + r * 0.05, hy - r * 0.2]
    ];
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 1;
    curls.forEach((c, i) => {
      ctx.fillStyle = cols[i % cols.length];
      ctx.beginPath(); ctx.arc(c[0], c[1], r * 0.32, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    });
  }
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rot);
  // plus de vies perdues = plus gris (0 = couleur normale, 1 = tout gris)
  const dmg = Math.max(0, Math.min(1, (MAX_LIVES - lives) / MAX_LIVES));
  drawSquirrel(bird.r * SQUIRREL_SCALE * birdScale, [150, 92, 50], [38, 24, 14], dmg, currentShirtColor(), currentHatType(), currentGlassesType(), currentSocksColor());
  ctx.restore();
}

// Dessine un petit écureuil (à attraper ou qui suit) : couleur RGB + grisaille (dmg)
function drawSmallBird(x, y, bodyRgb, strokeRgb, dmg) {
  ctx.save();
  ctx.translate(x, y);
  drawSquirrel(SMALL_R * SQUIRREL_SCALE, bodyRgb, strokeRgb, dmg);
  ctx.restore();
}

function drawBackground() {
  // ciel déjà via CSS gradient, on dessine quelques nuages de smog gris
  ctx.fillStyle = 'rgba(150,150,153,.45)';
  const t = (frame * 0.3) % (W + 120);
  for (let i = 0; i < 3; i++) {
    const cx = ((i * 160) - t + W + 120) % (W + 120) - 60;
    const cy = 80 + i * 50;
    ctx.beginPath();
    ctx.arc(cx, cy, 18, 0, Math.PI*2);
    ctx.arc(cx + 20, cy + 4, 22, 0, Math.PI*2);
    ctx.arc(cx + 44, cy, 16, 0, Math.PI*2);
    ctx.fill();
  }
}

// Fumée qui s'élève d'une cheminée
function drawChimneySmoke(cx, topY, seed) {
  for (let j = 0; j < 6; j++) {
    const t = (frame * 0.6 + j * 22 + seed * 13) % 130;
    const y = topY - t;
    const r = 5 + t * 0.13;
    const alpha = 0.45 * (1 - t / 130);
    ctx.fillStyle = `rgba(120,120,124,${alpha.toFixed(3)})`;
    ctx.beginPath();
    ctx.arc(cx + Math.sin(t * 0.06 + seed) * 10, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawFactory(x, baseY, w, h, seed) {
  const topY = baseY - h;
  // corps du bâtiment (silhouette industrielle un peu estompée)
  ctx.fillStyle = '#565b60';
  ctx.fillRect(x, topY, w, h);
  ctx.fillStyle = '#4a4e53';
  ctx.fillRect(x, topY, w, 6);
  // toit en dents de scie
  ctx.fillStyle = '#50545a';
  const teeth = Math.max(2, Math.floor(w / 22));
  for (let i = 0; i < teeth; i++) {
    const tx = x + i * (w / teeth);
    ctx.beginPath();
    ctx.moveTo(tx, topY);
    ctx.lineTo(tx + (w / teeth) / 2, topY - 8);
    ctx.lineTo(tx + (w / teeth), topY);
    ctx.closePath();
    ctx.fill();
  }
  // fenêtres faiblement éclairées
  ctx.fillStyle = 'rgba(214,196,106,0.55)';
  for (let wy = topY + 16; wy < baseY - 10; wy += 18) {
    for (let wx = x + 8; wx < x + w - 8; wx += 18) {
      ctx.fillRect(wx, wy, 8, 10);
    }
  }
  // cheminées + fumée
  const chimX1 = x + w * 0.25, chimX2 = x + w * 0.7;
  ctx.fillStyle = '#3f4347';
  ctx.fillRect(chimX1 - 6, topY - 26, 12, 26);
  ctx.fillRect(chimX2 - 6, topY - 34, 12, 34);
  drawChimneySmoke(chimX1, topY - 26, seed);
  drawChimneySmoke(chimX2, topY - 34, seed + 3);
}

// Dessine un élément de décor à sa position défilée, en bouclant sur la largeur de l'écran.
// drawFn(x) reçoit la position horizontale décalée ; on dessine 3 copies pour un défilement continu.
function drawScrolled(itemX, drawFn) {
  const base = itemX - (bgScroll % W);
  drawFn(base - W);
  drawFn(base);
  drawFn(base + W);
}

const FACTORY_LIST = [
  { x: 20,  w: 95,  h: 75, seed: 1 },
  { x: 150, w: 70,  h: 55, seed: 2 },
  { x: 250, w: 120, h: 90, seed: 3 }
];

function drawFactories() {
  const baseY = GROUND_Y;
  for (const f of FACTORY_LIST) {
    drawScrolled(f.x, (x) => drawFactory(x, baseY, f.w, f.h, f.seed));
  }
}

// ---- Forêt coupée (un des décors catastrophe) ----
let forestItems = null;

function ensureForest() {
  if (forestItems) return;
  forestItems = [];
  // souches et troncs abattus
  for (let i = 0; i < 7; i++) {
    forestItems.push({
      x: 24 + Math.random() * (W - 48),
      h: 16 + Math.random() * 28,          // hauteur de souche
      w: 16 + Math.random() * 16,          // largeur du tronc
      type: Math.random() < 0.4 ? 'log' : 'stump'
    });
  }
  // quelques arbres morts debout (sans feuilles)
  for (let i = 0; i < 3; i++) {
    forestItems.push({
      x: 40 + Math.random() * (W - 80),
      h: 110 + Math.random() * 70,         // hauteur de l'arbre
      w: 9 + Math.random() * 5,            // largeur du tronc
      seed: Math.random() * 100,
      type: 'tree'
    });
  }
  // animaux morts au sol
  for (let i = 0; i < 2; i++) {
    forestItems.push({
      x: 40 + Math.random() * (W - 80),
      w: 16 + Math.random() * 8,           // taille de l'animal
      c: Math.random() < 0.5 ? '#7a5a3a' : '#8a8076',
      type: 'animal'
    });
  }
  forestItems.sort((a, b) => a.x - b.x);
}

// anneaux de croissance sur une surface de coupe (ellipse)
function drawRings(cx, cy, rx, ry) {
  ctx.fillStyle = '#c79a68';
  ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#9a6b3c';
  ctx.lineWidth = 1;
  for (let k = 1; k <= 3; k++) {
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx * (k / 3.5), ry * (k / 3.5), 0, 0, Math.PI * 2);
    ctx.stroke();
  }
}

// arbre mort debout, sans feuilles (tronc tapéré + branches nues)
function drawDeadTree(x, baseY, h, w, seed) {
  const topY = baseY - h;
  ctx.fillStyle = '#5b4a3a';
  ctx.strokeStyle = '#3a2e22';
  ctx.lineWidth = 1.5;
  // tronc qui s'affine vers le haut
  ctx.beginPath();
  ctx.moveTo(x - w / 2, baseY);
  ctx.lineTo(x - w * 0.18, topY);
  ctx.lineTo(x + w * 0.18, topY);
  ctx.lineTo(x + w / 2, baseY);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // branches nues
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#4a3b2c';
  const branch = (bx, by, ang, len, width) => {
    if (len < 6) return;
    const ex = bx + Math.cos(ang) * len;
    const ey = by + Math.sin(ang) * len;
    ctx.lineWidth = width;
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(ex, ey); ctx.stroke();
    branch(ex, ey, ang - 0.5, len * 0.6, width * 0.6);
    branch(ex, ey, ang + 0.45, len * 0.6, width * 0.6);
  };
  for (let i = 0; i < 4; i++) {
    const by = topY + (h * 0.08) + i * (h * 0.18);
    const side = (i % 2 === 0) ? 1 : -1;
    const ang = (-Math.PI / 2) + side * (0.6 + ((seed + i) % 3) * 0.12);
    branch(x, by, ang, h * 0.18, Math.max(1.5, w * 0.35));
  }
  ctx.lineWidth = 1.5;
}

// animal mort au sol (couché, pattes raides en l'air, œil en croix)
function drawDeadAnimal(x, baseY, size, color) {
  const cy = baseY - size * 0.28;
  ctx.strokeStyle = '#2e241b';
  ctx.fillStyle = color;
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  // pattes raides vers le haut
  for (let i = 0; i < 4; i++) {
    const lx = x - size * 0.5 + i * (size * 0.33);
    ctx.beginPath();
    ctx.moveTo(lx, cy);
    ctx.lineTo(lx + (i % 2 ? 3 : -3), cy - size * 0.5);
    ctx.stroke();
  }
  // corps
  ctx.beginPath();
  ctx.ellipse(x, cy, size * 0.7, size * 0.4, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // tête
  ctx.beginPath();
  ctx.arc(x - size * 0.85, cy - size * 0.05, size * 0.3, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // œil en croix (X)
  ctx.lineWidth = 1.4;
  const ex = x - size * 0.9, ey = cy - size * 0.1, e = size * 0.12;
  ctx.beginPath();
  ctx.moveTo(ex - e, ey - e); ctx.lineTo(ex + e, ey + e);
  ctx.moveTo(ex + e, ey - e); ctx.lineTo(ex - e, ey + e);
  ctx.stroke();
}

// champignon hallucinogène (chapeau rouge à pois, pied clair)
function drawMushroom(x, y) {
  const r = MUSH_R;
  // pied
  ctx.fillStyle = '#f3ead2';
  ctx.strokeStyle = '#c9b98f';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(x - r * 0.32, y - r * 0.1, r * 0.64, r * 0.95, r * 0.2);
  ctx.fill(); ctx.stroke();
  // chapeau rouge (dôme)
  ctx.fillStyle = '#e0322b';
  ctx.strokeStyle = '#a11f1a';
  ctx.beginPath();
  ctx.ellipse(x, y, r, r * 0.78, 0, Math.PI, 2 * Math.PI);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // pois blancs
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x - r * 0.42, y - r * 0.18, r * 0.16, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(x + r * 0.32, y - r * 0.28, r * 0.13, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(x + r * 0.05, y - r * 0.05, r * 0.12, 0, 6.28); ctx.fill();
}

// burger (malus : ralentit + alourdit)
function drawBurger(x, y) {
  const r = BOULET_R;
  const w = r * 2.3;
  ctx.lineWidth = 1.2;
  ctx.strokeStyle = '#8a5a26';
  // pain du bas
  ctx.fillStyle = '#e0a35b';
  ctx.beginPath();
  ctx.roundRect(x - w / 2, y + r * 0.45, w, r * 0.55, [4, 4, 7, 7]);
  ctx.fill(); ctx.stroke();
  // steak
  ctx.fillStyle = '#6b3f25';
  ctx.beginPath();
  ctx.roundRect(x - w / 2 - 1, y + r * 0.12, w + 2, r * 0.42, 5);
  ctx.fill(); ctx.stroke();
  // fromage (carré fondant avec coins pendants)
  ctx.fillStyle = '#f3c44b';
  ctx.beginPath();
  ctx.moveTo(x - w / 2, y + r * 0.02);
  ctx.lineTo(x + w / 2, y + r * 0.02);
  ctx.lineTo(x + w / 2 - 3, y + r * 0.42);
  ctx.lineTo(x + w / 4, y + r * 0.18);
  ctx.lineTo(x, y + r * 0.42);
  ctx.lineTo(x - w / 4, y + r * 0.18);
  ctx.lineTo(x - w / 2 + 3, y + r * 0.42);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // salade (bande verte ondulée)
  ctx.fillStyle = '#79c34b';
  ctx.beginPath();
  ctx.moveTo(x - w / 2 - 2, y - r * 0.02);
  for (let i = 0; i <= 6; i++) {
    const px = x - w / 2 + w * (i / 6);
    ctx.lineTo(px, y - r * 0.02 + (i % 2 ? -3 : 3));
  }
  ctx.lineTo(x + w / 2 + 2, y + r * 0.12);
  ctx.lineTo(x - w / 2 - 2, y + r * 0.12);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // pain du haut (dôme)
  ctx.fillStyle = '#e8a55c';
  ctx.beginPath();
  ctx.ellipse(x, y - r * 0.08, w / 2, r * 0.78, 0, Math.PI, 2 * Math.PI);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // graines de sésame
  ctx.fillStyle = '#fff4d8';
  const seeds = [[-0.4, -0.45], [0, -0.62], [0.4, -0.45], [-0.18, -0.28], [0.2, -0.28]];
  for (const s of seeds) {
    ctx.save();
    ctx.translate(x + s[0] * w * 0.5, y - r * 0.08 + s[1] * r);
    ctx.rotate(0.5);
    ctx.beginPath(); ctx.ellipse(0, 0, 1.9, 1, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

// item bouclier : petite bulle brillante avec un écusson
function drawShield(x, y) {
  const r = SHIELD_R;
  // bulle
  const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.2, x, y, r);
  grad.addColorStop(0, 'rgba(180,225,255,0.85)');
  grad.addColorStop(1, 'rgba(80,160,230,0.45)');
  ctx.fillStyle = grad;
  ctx.strokeStyle = 'rgba(120,200,255,0.9)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  // écusson
  ctx.fillStyle = '#2d7fd6';
  ctx.strokeStyle = '#1c5fa6';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x, y - r * 0.55);
  ctx.lineTo(x + r * 0.45, y - r * 0.35);
  ctx.lineTo(x + r * 0.45, y + r * 0.1);
  ctx.quadraticCurveTo(x, y + r * 0.6, x - r * 0.45, y + r * 0.1);
  ctx.lineTo(x - r * 0.45, y - r * 0.35);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // reflet
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.ellipse(x - r * 0.35, y - r * 0.4, r * 0.2, r * 0.12, -0.6, 0, Math.PI * 2); ctx.fill();
}

// bulle de protection autour de l'écureuil ; `hits` = utilisations restantes (1 = fissurée)
function drawShieldBubble(x, y, radius, hits) {
  // clignote sur la dernière seconde avant expiration du timer
  if (shieldUntil - Date.now() < 1000 && Math.floor(frame / 4) % 2 === 0) return;
  ctx.save();
  const cracked = hits <= 1;
  const grad = ctx.createRadialGradient(x, y, radius * 0.5, x, y, radius);
  grad.addColorStop(0, 'rgba(150,210,255,0.05)');
  grad.addColorStop(0.8, `rgba(120,200,255,${cracked ? 0.12 : 0.18})`);
  grad.addColorStop(1, `rgba(150,225,255,${cracked ? 0.28 : 0.4})`);
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = cracked ? 'rgba(180,220,255,0.55)' : 'rgba(180,230,255,0.8)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.stroke();
  // petit reflet qui tourne
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  const a = frame * 0.06;
  ctx.beginPath();
  ctx.ellipse(x + Math.cos(a) * radius * 0.6, y + Math.sin(a) * radius * 0.6, 3, 2, a, 0, Math.PI * 2);
  ctx.fill();
  // fissures après la première utilisation
  if (cracked) {
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.lineWidth = 1.3;
    const cracks = [
      [-0.9, -0.2, -0.3, 0.1, 0.1, -0.4, 0.5, 0.0],
      [0.2, 0.9, 0.0, 0.3, -0.3, 0.2]
    ];
    for (const cr of cracks) {
      ctx.beginPath();
      for (let i = 0; i < cr.length; i += 2) {
        const px = x + cr[i] * radius, py = y + cr[i + 1] * radius;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawCutForest() {
  ensureForest();
  const g = GROUND_Y;
  // 1) arbres morts au fond
  for (const it of forestItems) {
    if (it.type === 'tree') drawScrolled(it.x, (x) => drawDeadTree(x, g, it.h, it.w, it.seed));
  }
  // 2) souches, troncs abattus et animaux morts au premier plan
  for (const it of forestItems) {
    if (it.type === 'stump') {
      drawScrolled(it.x, (x) => {
        ctx.fillStyle = '#6b4a2b';
        ctx.strokeStyle = '#3f2a16';
        ctx.lineWidth = 1.5;
        ctx.fillRect(x - it.w / 2, g - it.h, it.w, it.h);
        ctx.strokeRect(x - it.w / 2, g - it.h, it.w, it.h);
        drawRings(x, g - it.h, it.w / 2, it.w / 5);
      });
    } else if (it.type === 'log') {
      const len = it.w * 3.2, r = it.w * 0.45;
      const y = g - r - 1;
      drawScrolled(it.x, (x) => {
        ctx.fillStyle = '#6b4a2b';
        ctx.strokeStyle = '#3f2a16';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(x - len / 2, y - r, len, r * 2, r);
        ctx.fill(); ctx.stroke();
        drawRings(x + len / 2, y, r * 0.55, r);
      });
    } else if (it.type === 'animal') {
      drawScrolled(it.x, (x) => drawDeadAnimal(x, g, it.w, it.c));
    }
  }
}

// ---- Lac asséché (un des décors catastrophe) ----
let lakeItems = null;

function ensureLake() {
  if (lakeItems) return;
  lakeItems = { cracks: [], fish: [], cacti: [] };
  // fissures de la boue séchée (segments ramifiés)
  const bedTop = GROUND_Y - 4;
  for (let i = 0; i < 16; i++) {
    const x = Math.random() * W;
    const y = bedTop + Math.random() * (H - bedTop);
    const ang = Math.random() * Math.PI * 2;
    const len = 12 + Math.random() * 26;
    lakeItems.cracks.push({ x, y, ang, len });
    // petite branche
    lakeItems.cracks.push({ x, y, ang: ang + 1.6, len: len * 0.6 });
  }
  // poissons morts échoués sur la vase
  for (let i = 0; i < 5; i++) {
    lakeItems.fish.push({
      x: 30 + Math.random() * (W - 60),
      y: GROUND_Y + 6 + Math.random() * (H - GROUND_Y - 14),
      size: 9 + Math.random() * 7,
      rot: (Math.random() - 0.5) * 0.8,
      c: ['#9aa6ae', '#a7926b', '#b0b6ba'][Math.floor(Math.random() * 3)]
    });
  }
  // cactus (désert)
  for (let i = 0; i < 3; i++) {
    lakeItems.cacti.push({
      x: 40 + Math.random() * (W - 80),
      h: 46 + Math.random() * 44,
      w: 12 + Math.random() * 6,
      arms: Math.random() < 0.7 ? 2 : 1
    });
  }
}

// cactus type saguaro (tronc + bras)
function drawCactus(x, baseY, h, w, arms) {
  ctx.fillStyle = '#4f8b3f';
  ctx.strokeStyle = '#356026';
  ctx.lineWidth = 1.5;
  const topY = baseY - h;
  // tronc
  ctx.beginPath();
  ctx.roundRect(x - w / 2, topY, w, h, w / 2);
  ctx.fill(); ctx.stroke();
  // bras
  const armW = w * 0.7;
  const drawArm = (dir) => {
    const ax = x + dir * (w / 2);
    const ay = baseY - h * 0.5;
    ctx.beginPath();
    ctx.roundRect(ax - (dir < 0 ? armW : 0), ay, armW, armW * 0.8, armW / 2); // coude horizontal
    ctx.fill(); ctx.stroke();
    ctx.beginPath();
    ctx.roundRect(ax + dir * (armW - armW * 0.9) - armW * 0.45, ay - h * 0.28, armW * 0.9, h * 0.32, armW / 2); // montée
    ctx.fill(); ctx.stroke();
  };
  drawArm(1);
  if (arms >= 2) drawArm(-1);
  // épines (petits traits)
  ctx.strokeStyle = 'rgba(40,70,30,0.6)';
  ctx.lineWidth = 1;
  for (let y = topY + 6; y < baseY - 4; y += 9) {
    ctx.beginPath(); ctx.moveTo(x - w / 2, y); ctx.lineTo(x - w / 2 - 3, y - 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + w / 2, y); ctx.lineTo(x + w / 2 + 3, y - 2); ctx.stroke();
  }
}

// poisson mort (couché, ventre exposé, œil en croix)
function drawDeadFish(x, y, size, rot, c) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.fillStyle = c;
  ctx.strokeStyle = '#4a4036';
  ctx.lineWidth = 1.3;
  // corps
  ctx.beginPath();
  ctx.ellipse(0, 0, size, size * 0.42, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // queue
  ctx.beginPath();
  ctx.moveTo(-size, 0);
  ctx.lineTo(-size * 1.5, -size * 0.45);
  ctx.lineTo(-size * 1.5, size * 0.45);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // arêtes ventrales
  ctx.beginPath();
  for (let i = -1; i <= 2; i++) { ctx.moveTo(i * size * 0.4, -size * 0.2); ctx.lineTo(i * size * 0.4, size * 0.2); }
  ctx.stroke();
  // œil en croix
  const ex = size * 0.6, e = size * 0.13;
  ctx.beginPath();
  ctx.moveTo(ex - e, -e * 0.5 - size * 0.05); ctx.lineTo(ex + e, e * 0.5 - size * 0.05);
  ctx.moveTo(ex + e, -e * 0.5 - size * 0.05); ctx.lineTo(ex - e, e * 0.5 - size * 0.05);
  ctx.stroke();
  ctx.restore();
}

function drawDriedLake() {
  ensureLake();
  const bedTop = GROUND_Y - 4;
  // lit du lac : vase craquelée beige (large pour couvrir pendant le glissement)
  ctx.fillStyle = '#bca972';
  ctx.fillRect(-W, bedTop, 3 * W, H - bedTop);
  // ancienne rive (creux plus sombre vers le centre)
  ctx.fillStyle = 'rgba(120,100,60,0.35)';
  ctx.beginPath();
  ctx.ellipse(W / 2, H, W * 0.55, (H - bedTop) * 1.6, 0, Math.PI, Math.PI * 2);
  ctx.fill();
  // fissures (défilent)
  ctx.strokeStyle = '#8a744a';
  ctx.lineWidth = 1.4;
  ctx.lineCap = 'round';
  for (const cr of lakeItems.cracks) {
    drawScrolled(cr.x, (x) => {
      ctx.beginPath();
      ctx.moveTo(x, cr.y);
      ctx.lineTo(x + Math.cos(cr.ang) * cr.len, cr.y + Math.sin(cr.ang) * cr.len);
      ctx.stroke();
    });
  }
  // cactus (derrière les poissons)
  for (const c of lakeItems.cacti) drawScrolled(c.x, (x) => drawCactus(x, GROUND_Y, c.h, c.w, c.arms));
  // poissons morts
  for (const f of lakeItems.fish) drawScrolled(f.x, (x) => drawDeadFish(x, f.y, f.size, f.rot, f.c));
}

function drawGround() {
  // sol industriel (terre/béton sombre)
  ctx.fillStyle = '#6e6a58';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.fillStyle = '#565241';
  ctx.fillRect(0, GROUND_Y, W, 6);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  // pendant l'effet hallucinogène : zoom pulsé centré sur l'écureuil
  const tripping = Date.now() < tripUntil;
  ctx.save();
  if (tripping) {
    const z = 1.2 + Math.sin(frame * 0.12) * 0.2;   // pulse entre 1.0 et ~1.4
    ctx.translate(bird.x, bird.y);
    ctx.scale(z, z);
    ctx.translate(-bird.x, -bird.y);
  }
  drawBackground();
  drawGround();
  // décor d'arrière-plan : glisse de droite à gauche lors d'un changement
  const tElapsed = Date.now() - transStart;
  if (tElapsed < TRANSITION_MS) {
    const t = tElapsed / TRANSITION_MS;
    const e = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; // easeInOut
    ctx.save(); ctx.translate(-e * W, 0); drawSceneDecor(fromScene); ctx.restore();      // sort à gauche
    ctx.save(); ctx.translate((1 - e) * W, 0); drawSceneDecor(toScene); ctx.restore();   // entre par la droite
  } else {
    drawSceneDecor(scene);
  }
  // obstacles au premier plan
  for (const p of pipes) drawPipe(p);
  // grisaille commune (selon les vies perdues)
  const dmg = Math.max(0, Math.min(1, (MAX_LIVES - lives) / MAX_LIVES));
  // oiseaux qui suivent (dessinés derrière le gros oiseau) : grisonnent aussi
  for (let i = followers.length - 1; i >= 0; i--) {
    const f = followers[i];
    if (f.x !== undefined) drawSmallBird(f.x, f.y, f.body, f.stroke, dmg);
  }
  // petits oiseaux à attraper : gardent leur couleur vive pour bien les repérer
  for (const b of freeBirds) drawSmallBird(b.x, b.y, b.body, b.stroke, 0);
  // champignons hallucinogènes
  for (const m of mushrooms) drawMushroom(m.x, m.y);
  // burgers (ralentissement + lourdeur)
  for (const wgt of weights) drawBurger(wgt.x, wgt.y);
  // boucliers
  for (const sh of shields) drawShield(sh.x, sh.y);

  // le gros oiseau clignote pendant l'invincibilité
  const invincible = Date.now() < invincibleUntil;
  if (!(invincible && Math.floor(frame / 5) % 2 === 0)) drawBird();

  // bulle de protection autour de l'écureuil (bouclier actif) — fissurée après 1 utilisation
  if (shieldActive()) drawShieldBubble(bird.x, bird.y, bird.r * birdScale + 10, shieldHits);

  // score
  if (state === 'play' || state === 'dead') {
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 4;
    ctx.font = 'bold 44px Segoe UI, Arial';
    ctx.textAlign = 'center';
    ctx.strokeText(score, W/2, 70);
    ctx.fillText(score, W/2, 70);

    // nombre d'oiseaux attrapés
    if (followers.length > 0) {
      ctx.font = 'bold 20px Segoe UI, Arial';
      ctx.lineWidth = 3;
      const txt = '🐿️ ×' + followers.length;
      ctx.strokeText(txt, W/2, 100);
      ctx.fillText(txt, W/2, 100);
    }

    // vies (cœurs)
    ctx.font = '22px Segoe UI, Arial';
    ctx.textAlign = 'left';
    let hearts = '';
    const total = Math.max(MAX_LIVES, lives);
    for (let i = 0; i < total; i++) hearts += i < lives ? '❤️' : '🤍';
    ctx.fillText(hearts, 12, 34);
  }

  ctx.restore();   // fin du zoom

  // ---- EFFET HALLUCINOGÈNE : couleurs partout (par-dessus, sans zoom) ----
  if (tripping) drawTrip();
}

// superpose un effet psychédélique de couleurs sur toute la scène
function drawTrip() {
  const hue = (frame * 7) % 360;
  // recolore toute l'image avec une teinte qui défile
  ctx.save();
  ctx.globalCompositeOperation = 'hue';
  ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
  // bulles de couleur flottantes par-dessus
  ctx.save();
  ctx.globalCompositeOperation = 'overlay';
  for (let i = 0; i < 5; i++) {
    const h = (hue + i * 72) % 360;
    const bx = (i * 97 + frame * 2.5) % (W + 200) - 100;
    const by = (Math.sin(frame * 0.04 + i) * 0.5 + 0.5) * H;
    const rad = 90 + Math.sin(frame * 0.06 + i) * 40;
    ctx.fillStyle = `hsla(${h}, 100%, 60%, 0.65)`;
    ctx.beginPath(); ctx.arc(bx, by, rad, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

// Boucle à pas de temps fixe : la logique tourne toujours à 60 Hz en temps réel,
// quel que soit le taux de rafraîchissement de l'écran (PC, téléphone lent, etc.)
const STEP_MS = 1000 / 60;   // durée d'un « tick » logique
const SPEED_MULT = 2;        // vitesse globale du jeu (2 = deux fois plus rapide)
let lastTime = null;
let acc = 0;

function loop(now) {
  if (lastTime === null) lastTime = now;
  let elapsed = now - lastTime;
  lastTime = now;

  // le bouton pause n'apparaît qu'en cours de partie ; le bouton accueil seulement en pause
  pauseBtn.style.display = (state === 'play') ? 'block' : 'none';
  homeBtn.style.display = paused ? 'block' : 'none';

  if (paused) {
    // jeu figé : on dessine la scène + l'écran de pause, sans faire avancer la logique
    draw();
    drawPauseScreen();
    requestAnimationFrame(loop);
    return;
  }

  // évite de « rattraper » trop d'un coup (onglet en arrière-plan, gros lag)
  if (elapsed > 250) elapsed = 250;
  acc += elapsed * SPEED_MULT;
  while (acc >= STEP_MS) {
    update();
    updateCountdown();
    acc -= STEP_MS;
  }
  draw();
  requestAnimationFrame(loop);
}

function drawPauseScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.font = 'bold 42px Segoe UI, Arial';
  ctx.fillText('⏸ Pause', W / 2, H / 2 - 10);
  ctx.font = '18px Segoe UI, Arial';
  ctx.fillText('Appuie sur le bouton ▶ ou P pour reprendre', W / 2, H / 2 + 28);
  ctx.textAlign = 'left';
}

// --- Contrôles ---
canvas.addEventListener('mousedown', e => { e.preventDefault(); flap(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });
overlay.addEventListener('mousedown', e => { e.preventDefault(); flap(); });
overlay.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });
window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
  else if (e.code === 'KeyP' || e.code === 'Escape') { e.preventDefault(); togglePause(); }
});

// bouton pause (stopPropagation pour ne pas déclencher un saut)
function pauseHandler(e) { e.preventDefault(); e.stopPropagation(); togglePause(); }
pauseBtn.addEventListener('mousedown', pauseHandler);
pauseBtn.addEventListener('touchstart', pauseHandler, { passive: false });

function homeHandler(e) { e.preventDefault(); e.stopPropagation(); goHome(); }
homeBtn.addEventListener('mousedown', homeHandler);
homeBtn.addEventListener('touchstart', homeHandler, { passive: false });

showReady();   // affiche l'accueil (avec le bouton Personnaliser) dès le chargement
requestAnimationFrame(loop);
</script>
