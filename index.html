<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Floppy Squirrel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #6e7378;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #wrap {
    position: relative;
    box-shadow: 0 10px 40px rgba(0,0,0,.35);
    border-radius: 8px;
    overflow: hidden;
  }
  canvas {
    display: block;
    background: linear-gradient(#9fa9ad 0%, #b9b2a3 55%, #c9c1ac 70%, #8a8470 70%, #6e6a58 100%);
    touch-action: none;
    cursor: pointer;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-align: center;
    background: rgba(0,0,0,.25);
    text-shadow: 0 2px 4px rgba(0,0,0,.5);
    transition: opacity .2s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #overlay h1 { font-size: 30px; margin-bottom: 8px; letter-spacing: 1px; }
  #overlay p { font-size: 16px; margin: 4px 0; }
  #overlay .big { font-size: 48px; font-weight: bold; margin: 6px 0; }
  #overlay .hint {
    margin-top: 18px;
    font-size: 14px;
    background: rgba(255,255,255,.2);
    padding: 8px 16px;
    border-radius: 20px;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse { 0%,100% { transform: scale(1);} 50% { transform: scale(1.08);} }
  #pauseBtn {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 5;
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 50%;
    background: rgba(0,0,0,.45);
    color: #fff;
    font-size: 18px;
    line-height: 40px;
    cursor: pointer;
    display: none;
    padding: 0;
    transition: background .15s;
  }
  #pauseBtn:hover { background: rgba(0,0,0,.65); }
  #soundBtn {
    position: absolute;
    top: 10px;
    right: 58px;
    z-index: 5;
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 50%;
    background: rgba(0,0,0,.45);
    color: #fff;
    font-size: 18px;
    line-height: 40px;
    cursor: pointer;
    padding: 0;
  }
  #soundBtn:hover { background: rgba(0,0,0,.65); }
  #godBtn {
    position: absolute;
    bottom: 10px;
    left: 10px;
    z-index: 7;
    border: none;
    border-radius: 16px;
    background: rgba(0,0,0,.45);
    color: #ffd86b;
    font-size: 12px;
    font-weight: bold;
    padding: 7px 12px;
    cursor: pointer;
    display: none;
  }
  #godBtn.on { background: #b8860b; color: #fff; }
  #batBtn {
    position: absolute;
    bottom: 90px;
    right: 12px;
    z-index: 7;
    width: 92px;
    height: 92px;
    border: none;
    border-radius: 16px;
    background: #b5793b;
    color: #fff;
    font-size: 22px;
    font-weight: bold;
    line-height: 1.15;
    padding: 0;
    cursor: pointer;
    display: none;
  }
  #batBtn:active { background: #8a5a2a; }
  #codePanel {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 9;
    background: rgba(20,24,28,.92);
    border-radius: 12px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,.5);
  }
  #codePanel.hidden { display: none; }
  #codeDisplay {
    color: #ffd86b;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 4px;
    font-family: monospace;
  }
  #codeKeys {
    display: grid;
    grid-template-columns: repeat(3, 44px);
    gap: 6px;
  }
  #codeKeys button {
    height: 44px;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,.85);
    color: #222;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
  }
  #codeKeys button:active { background: #ffd86b; }
  #codeClose {
    border: none;
    border-radius: 16px;
    background: #c0392b;
    color: #fff;
    font-size: 13px;
    padding: 7px 14px;
    cursor: pointer;
  }
  #homeBtn {
    position: absolute;
    left: 50%;
    top: 60%;
    transform: translateX(-50%);
    z-index: 6;
    border: none;
    border-radius: 22px;
    background: rgba(255,255,255,.92);
    color: #333;
    font-size: 16px;
    font-weight: bold;
    padding: 10px 22px;
    cursor: pointer;
    display: none;
    transition: background .15s;
  }
  #homeBtn:hover { background: #fff; }
  #customize {
    position: absolute;
    inset: 0;
    z-index: 8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(20,24,28,.82);
    color: #fff;
    text-align: center;
  }
  #customize.hidden { display: none; }
  #customize h2 { font-size: 24px; }
  #preview {
    background: linear-gradient(#9fa9ad, #c9c1ac);
    border-radius: 10px;
    box-shadow: 0 4px 14px rgba(0,0,0,.4);
  }
  #tabs {
    display: flex;
    gap: 6px;
  }
  .tab {
    border: none;
    border-radius: 16px;
    background: rgba(255,255,255,.18);
    color: #fff;
    font-size: 13px;
    padding: 7px 12px;
    cursor: pointer;
  }
  .tab.active { background: #fff; color: #222; font-weight: bold; }
  #shirtOptions {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    max-width: 320px;
    min-height: 44px;
  }
  .optIcon {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    border: 3px solid transparent;
    border-radius: 12px;
    background: rgba(255,255,255,.2);
    color: #fff;
    font-size: 11px;
    padding: 6px 8px;
    cursor: pointer;
  }
  .optIcon canvas { background: rgba(255,255,255,.12); border-radius: 6px; }
  .optIcon.selected { border-color: #fff; background: rgba(255,255,255,.35); font-weight: bold; }
  .optLbl { white-space: nowrap; }
  .swatch {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    position: relative;
    box-shadow: 0 2px 6px rgba(0,0,0,.4);
  }
  .swatch.selected { border-color: #fff; transform: scale(1.12); }
  .swatch.none {
    background: #fff;
    color: #c0392b;
    font-size: 22px;
    line-height: 34px;
    font-weight: bold;
  }
  #closeCustomize {
    margin-top: 6px;
    border: none;
    border-radius: 22px;
    background: #2ecc71;
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    padding: 10px 28px;
    cursor: pointer;
  }
  #closeCustomize:hover { background: #27ae60; }
  #modeRow { display: flex; gap: 10px; margin: 6px 0; }
  #modeRow button {
    border: none;
    border-radius: 20px;
    background: #2ecc71;
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    padding: 12px 18px;
    cursor: pointer;
  }
  #modeRow button:hover { background: #27ae60; }
  #customizeBtn, #deadHomeBtn {
    margin-top: 10px;
    border: none;
    border-radius: 22px;
    background: rgba(255,255,255,.9);
    color: #333;
    font-size: 15px;
    font-weight: bold;
    padding: 9px 20px;
    cursor: pointer;
  }
  #customizeBtn:hover, #deadHomeBtn:hover { background: #fff; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="400" height="600"></canvas>
  <button id="pauseBtn" aria-label="Pause">⏸</button>
  <button id="soundBtn" aria-label="Son">🔊</button>
  <button id="godBtn">🛡️ Invincible : OFF</button>
  <button id="batBtn">🏏 Frapper</button>
  <button id="homeBtn">🏠 Accueil</button>
  <div id="codePanel" class="hidden">
    <div id="codeDisplay">····</div>
    <div id="codeKeys"></div>
    <button id="codeClose">Fermer ✕</button>
  </div>
  <div id="customize" class="hidden">
    <h2>🎨 Personnalisation</h2>
    <canvas id="preview" width="180" height="130"></canvas>
    <div id="tabs">
      <button class="tab" data-tab="shirt">👕 T-shirt</button>
      <button class="tab" data-tab="hat">🎩 Chapeau</button>
      <button class="tab" data-tab="glasses">🕶️ Lunettes</button>
      <button class="tab" data-tab="socks">🧦 Chaussette</button>
    </div>
    <div id="shirtOptions"></div>
    <button id="closeCustomize">Valider</button>
  </div>
  <div id="overlay">
    <h1>🐿️ Floppy Squirrel</h1>
    <p>Clique ou appuie sur <b>Espace</b> pour planer</p>
    <p>Évite les obstacles  — chaque contact coûte une vie ❤️</p>
    <div class="hint">Clique pour commencer</div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
let ctx = canvas.getContext('2d');   // réassignable (utilisé aussi pour l'aperçu de personnalisation)
const overlay = document.getElementById('overlay');
const pauseBtn = document.getElementById('pauseBtn');
const homeBtn = document.getElementById('homeBtn');
const godBtn = document.getElementById('godBtn');
const batBtn = document.getElementById('batBtn');
const codePanel = document.getElementById('codePanel');
const codeDisplay = document.getElementById('codeDisplay');
const codeKeys = document.getElementById('codeKeys');
const soundBtn = document.getElementById('soundBtn');
const W = canvas.width, H = canvas.height;
let paused = false;

// --- Audio (Web Audio API, sons générés, sans fichier) ---
let audioCtx = null, musicGain = null, sfxGain = null, musicTimer = null, melodyIdx = 0;
let soundOn = true;
function initAudio() {
  if (audioCtx) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return;
  audioCtx = new AC();
  musicGain = audioCtx.createGain(); musicGain.gain.value = 0.10; musicGain.connect(audioCtx.destination);
  sfxGain = audioCtx.createGain(); sfxGain.gain.value = 0.22; sfxGain.connect(audioCtx.destination);
}
function tone(freq, dur, type, dest, vol) {
  if (!audioCtx || !soundOn || !freq) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type || 'square'; o.frequency.value = freq;
  o.connect(g); g.connect(dest || sfxGain);
  const t = audioCtx.currentTime;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(vol || 1, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur + 0.03);
}
function slide(f1, f2, dur, type) {
  if (!audioCtx || !soundOn) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type || 'sawtooth';
  const t = audioCtx.currentTime;
  o.frequency.setValueAtTime(f1, t);
  o.frequency.exponentialRampToValueAtTime(f2, t + dur);
  o.connect(g); g.connect(sfxGain);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(1, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur + 0.03);
}
// bruitages
function sfxFlap()  { tone(480, 0.06, 'triangle', sfxGain, 0.3); }   // saut, modéré
function sfxFart() {
  // pet : basse fréquence saturée qui descend, avec vibrato
  if (!audioCtx || !soundOn) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sawtooth';
  const t = audioCtx.currentTime;
  o.frequency.setValueAtTime(125, t);
  o.frequency.linearRampToValueAtTime(65, t + 0.28);
  const lfo = audioCtx.createOscillator(), lg = audioCtx.createGain();
  lfo.frequency.value = 18; lg.gain.value = 22;
  lfo.connect(lg); lg.connect(o.frequency);
  o.connect(g); g.connect(sfxGain);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(0.55, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.3);
  o.start(t); lfo.start(t); o.stop(t + 0.32); lfo.stop(t + 0.32);
}
function sfxPick()  { tone(880, 0.09, 'triangle', sfxGain, 0.8); tone(1320, 0.08, 'triangle', sfxGain, 0.5); }
function sfxHit()   { tone(150, 0.18, 'sawtooth', sfxGain, 0.9); }
function sfxDeath() { slide(440, 90, 0.6, 'sawtooth'); }
function sfxPortal(){ slide(300, 1200, 0.4, 'square'); }
function sfxSwing() { tone(260, 0.06, 'square', sfxGain, 0.8); tone(180, 0.1, 'square', sfxGain, 0.6); }
function sfxLife()  { tone(660, 0.1, 'triangle', sfxGain, 0.8); tone(990, 0.12, 'triangle', sfxGain, 0.7); }
function sfxEat()   { tone(200, 0.07, 'square', sfxGain, 0.6); setTimeout(() => tone(140, 0.09, 'square', sfxGain, 0.6), 70); } // miam-miam
// musique : petite boucle entraînante
const MELODY = [
  330, 0, 392, 440, 0, 392, 330, 0,
  294, 330, 392, 0, 440, 392, 330, 0,
  349, 0, 440, 523, 0, 440, 349, 0,
  392, 440, 392, 0, 330, 294, 330, 0
];
function startMusic() {
  if (!audioCtx || !soundOn) return;
  stopMusic();
  musicTimer = setInterval(() => {
    let f = MELODY[melodyIdx % MELODY.length];
    melodyIdx++;
    if (!f) return;
    if (Date.now() < tripUntil) {
      // effet champignon : musique déformée (pitch tordu + timbre saturé)
      f *= 1 + Math.sin(melodyIdx * 1.7) * 0.28;
      tone(f, 0.26, 'sawtooth', musicGain, 1);
      tone(f * 1.01, 0.26, 'sawtooth', musicGain, 0.6);   // léger désaccord
    } else {
      tone(f, 0.2, 'triangle', musicGain, 1);
      if (melodyIdx % 4 === 0) tone(f / 2, 0.18, 'sine', musicGain, 0.8);
    }
  }, 230);
}
function stopMusic() { if (musicTimer) { clearInterval(musicTimer); musicTimer = null; } }
// triche : le code 1203 déverrouille le bouton d'invincibilité
let cheatUnlocked = false;
let godMode = false;
let codeBuffer = '';
let cheatSpeed = 1;   // code 4589 : multiplie la vitesse du jeu (1 ou 4)
let cheatUsed = false; // un code a-t-il été tapé pendant cette partie ? (score non enregistré)
let startScore = 0;   // code 6365 : score de départ choisi
let bigHead = false;  // code 4562 : grosse tête rouge (cosmétique)

// --- Personnalisation : t-shirt de l'écureuil ---
const SHIRTS = [
  { name: 'Aucun',  color: null },
  { name: 'Rouge',  color: [231, 76, 60] },
  { name: 'Bleu',   color: [52, 152, 219] },
  { name: 'Vert',   color: [46, 204, 113] },
  { name: 'Jaune',  color: [241, 196, 15] },
  { name: 'Violet', color: [155, 89, 182] },
  { name: 'Rose',   color: [255, 111, 174] },
  { name: 'Noir',   color: [52, 52, 60] },
  { name: 'Blanc',  color: [245, 245, 245] }
];
const HATS = [
  { name: 'Aucun', type: null },
  { name: 'Melon', type: 'bowler' },
  { name: 'Anniversaire', type: 'party' },
  { name: 'Casquette', type: 'cap' },
  { name: 'Perruque', type: 'wig' }
];
const GLASSES = [
  { name: 'Aucune', type: null },
  { name: 'Soleil', type: 'sun' },
  { name: 'Rondes', type: 'round' },
  { name: '3D', type: '3d' }
];
const SOCKS = [
  { name: 'Aucune', color: null },
  { name: 'Rouge',  color: [231, 76, 60] },
  { name: 'Bleu',   color: [52, 152, 219] },
  { name: 'Vert',   color: [46, 204, 113] },
  { name: 'Jaune',  color: [241, 196, 15] },
  { name: 'Violet', color: [155, 89, 182] },
  { name: 'Rose',   color: [255, 111, 174] },
  { name: 'Blanc',  color: [245, 245, 245] },
  { name: 'Noir',   color: [40, 40, 46] }
];
let shirtIndex = Number(localStorage.getItem('floppyShirt') || 0);
let hatIndex = Number(localStorage.getItem('floppyHat') || 0);
let glassesIndex = Number(localStorage.getItem('floppyGlasses') || 0);
let socksIndex = Number(localStorage.getItem('floppySocks') || 0);
if (!(shirtIndex >= 0 && shirtIndex < SHIRTS.length)) shirtIndex = 0;
if (!(hatIndex >= 0 && hatIndex < HATS.length)) hatIndex = 0;
if (!(glassesIndex >= 0 && glassesIndex < GLASSES.length)) glassesIndex = 0;
if (!(socksIndex >= 0 && socksIndex < SOCKS.length)) socksIndex = 0;
function currentShirtColor() { return SHIRTS[shirtIndex].color; }
function currentHatType() { return HATS[hatIndex].type; }
function currentGlassesType() { return GLASSES[glassesIndex].type; }
function currentSocksColor() { return SOCKS[socksIndex].color; }

// --- Paramètres du jeu ---
const GRAVITY = 0.13;
const FLAP = -4.0;
const PIPE_W = 60;
const PIPE_GAP = 170;
const PIPE_INTERVAL = 145;     // cadence indicative de spawn (en frames)
const MIN_PIPE_DISTANCE = 240; // distance horizontale minimale entre deux piliers (px)
const BASE_SPEED = 1.6;        // vitesse de départ
const SPEED_FROM = 15;         // score à partir duquel la vitesse augmente
const DOUBLE_FROM = 100;       // score à partir duquel les points doublent
const MAX_SPEED = 6.0;         // vitesse maximale
const ACCEL = 0.03;            // gain de vitesse par point au-delà du seuil
const INVERT_AT = 75;          // 1er portail (puis tous les PORTAL_EVERY points)
const PORTAL_EVERY = 75;       // un portail tous les 75 points
const ACCEL2 = 0.02;           // accélération réduite au-delà de INVERT_AT
// cycle d'orientations [inverted (G/D), flipped (H/B)] appliqué à chaque portail franchi :
// normal → horizontal → vertical → les deux → normal → ... (boucle)
const PORTAL_CYCLE = [[false, false], [true, false], [false, true], [true, true]];
let inverted = false;          // sens horizontal inversé ?
let flipped = false;           // haut/bas inversé ?
let portal = null;             // portail actif ({ x }) ou null
let portalsSpawned = 0;        // nombre de portails apparus
let portalsCrossed = 0;        // nombre de portails franchis
let portalFlashUntil = 0;      // timestamp ms : flash au passage du portail
const PORTAL_FLASH_MS = 500;
let speed = BASE_SPEED;        // vitesse courante (dynamique)
let bgScroll = 0;              // défilement du décor d'arrière-plan (parallaxe)
const BG_PARALLAX = 0.4;      // le décor défile plus lentement que les obstacles
const GROUND_Y = H * 0.85;

const bird = { x: 90, y: H/2, r: 14, vy: 0, rot: 0 };
let birdScale = 1;             // taille de l'écureuil (grossit avec le burger, rétrécit aux sauts)
const BURGER_GROW = 0.8;       // grossissement par burger mangé
const MAX_SCALE = 2.4;         // taille max
const SHRINK_PER_FLAP = 0.12;  // rétrécissement à chaque saut
let pipes = [];
let gameMode = 'classic';  // 'classic' (colonnes) ou 'dodge' (objets à éviter)
let objects = [];          // renards à éviter (mode dodge)
let objectCount = 0;
const OBJ_INTERVAL = 70;   // cadence d'apparition des renards (frames)
let bats = [];             // battes à ramasser (mode dodge)
let batUses = 0;           // coups de batte restants (tue un renard)
let swingUntil = 0;        // timestamp ms : animation de frappe
let hitFx = [];            // impacts « POW » des renards assommés
let batUnbreakable = false; // code 7458 : batte incassable (coups illimités)
const BAT_R = 12;
const BAT_USES = 3;
let mushrooms = [];        // champignons hallucinogènes
let tripUntil = 0;         // timestamp ms : fin de l'effet psychédélique
const MUSH_R = 11;
const TRIP_MS = 6000;      // durée de l'effet « couleurs partout »
let weights = [];          // burgers (alourdissent et ralentissent selon la taille)
const BOULET_R = 12;
let shields = [];          // items bouclier (bulle de protection)
let shieldHits = 0;        // utilisations restantes (se fissure après 1, disparaît après 2)
let shieldUntil = 0;       // timestamp ms : expiration du bouclier (4 s max)
const SHIELD_R = 12;
const SHIELD_USES = 2;     // nombre d'utilisations du bouclier
const SHIELD_MS = 4000;    // durée max du bouclier (même s'il reste des utilisations)
const SHIELD_BOUNCE = -7;  // rebond quand on touche le sol sous protection
function shieldActive() { return shieldHits > 0 && Date.now() < shieldUntil; }
// Effet burger lié à la TAILLE de l'écureuil : plus il est gros, plus c'est lent et lourd.
// En maigrissant (à chaque saut), la vitesse réaccélère et la gravité revient à la normale.
const SLOW_FLOOR = 0.45;   // vitesse minimale (quand l'écureuil est au plus gros)
const SLOW_PER_SCALE = 0.45; // ralentissement par unité de surtaille
const GRAV_PER_SCALE = 1.0;  // gravité ajoutée par unité de surtaille (saut inchangé)
let freeBirds = [];        // petits oiseaux à attraper (flottent entre les tuyaux)
let followers = [];        // petits oiseaux attrapés qui suivent le gros oiseau
let trail = [];            // historique des positions du gros oiseau (pour le suivi)
let pipeCount = 0;         // nombre de tuyaux générés
const SQUIRREL_SCALE = 0.62; // échelle visuelle des écureuils (collision inchangée)
const SMALL_R = 8;         // rayon des petits oiseaux
const FOLLOW_SPACING = 9;  // écart (en frames) entre chaque oiseau de la file
// palette de couleurs pour les petits oiseaux (corps, contour)
const SMALL_PALETTE = [
  { body: [231, 76, 60],  stroke: [192, 57, 43]  }, // rouge
  { body: [52, 152, 219], stroke: [41, 128, 185] }, // bleu
  { body: [46, 204, 113], stroke: [39, 174, 96]  }, // vert
  { body: [155, 89, 182], stroke: [142, 68, 173] }, // violet
  { body: [230, 126, 34], stroke: [211, 84, 0]   }, // orange
  { body: [255, 111, 174],stroke: [194, 24, 91]  }, // rose
  { body: [26, 188, 156], stroke: [22, 160, 133] }, // turquoise
  { body: [241, 196, 15], stroke: [243, 156, 18] }, // jaune
];
let smallColorIdx = 0;     // pour faire tourner les couleurs
let score = 0;
// records personnels séparés par mode (l'ancien 'flappyBest' sert de base au mode Colonnes)
let bestClassic = Number(localStorage.getItem('floppyBestClassic') || localStorage.getItem('flappyBest') || 0);
let bestDodge = Number(localStorage.getItem('floppyBestDodge') || 0);
function getBest() { return gameMode === 'dodge' ? bestDodge : bestClassic; }
let frame = 0;
let state = 'ready'; // 'ready' | 'countdown' | 'play' | 'dead'
let countdownStart = 0;
const REPLAY_DELAY = 3000; // ms d'attente (compte à rebours) avant que la partie démarre
let deadAt = 0;
const DEAD_LOCK = 1000;    // ms pendant lesquelles le clic est ignoré après la mort
const MAX_LIVES = 3;
let lives = MAX_LIVES;
let invincibleUntil = 0;       // timestamp ms : invincibilité après avoir pris un dégât
const HIT_INVINCIBLE = 1100;   // durée d'invincibilité après contact avec la fumée (ms)
let nextLifeAt = 50;           // prochain palier de score qui donne une vie bonus
const LIFE_EVERY = 50;
// --- Décors « catastrophe » : tirés au hasard tous les 4 écureuils sauvés ---
const SCENE_EVERY = 4;                 // change de décor tous les 4 écureuils
const SCENES = ['forest', 'lake', 'factory']; // forêt coupée / désert (lac asséché) / usines
let scene = null;                      // décor actif (null = usines au début)
let nextSceneChange = SCENE_EVERY;
let fromScene = null;                  // décor qui sort pendant la transition
let toScene = null;                    // décor qui entre pendant la transition
let transitioning = false;             // un glissement de décor est en cours ?
let transOffset = 0;                   // décalage (px) du glissement, avance à la vitesse du décor

function reset() {
  bird.y = H/2; bird.vy = 0; bird.rot = 0;
  birdScale = 1;
  pipes = [];
  objects = [];
  objectCount = 0;
  bats = [];
  batUses = batUnbreakable ? 999 : 0;
  swingUntil = 0;
  hitFx = [];
  mushrooms = [];
  tripUntil = 0;
  weights = [];
  shields = [];
  shieldHits = 0;
  shieldUntil = 0;
  freeBirds = [];
  followers = [];
  trail = [];
  pipeCount = 0;
  smallColorIdx = 0;
  score = startScore;   // 0 normalement, ou le score choisi via le code 6365
  frame = 0;
  lives = MAX_LIVES + (bigHead ? 1 : 0);   // tête rouge → 4 cœurs au départ
  invincibleUntil = 0;
  nextLifeAt = LIFE_EVERY;
  speed = BASE_SPEED;
  scene = SCENES[Math.floor(Math.random() * SCENES.length)]; // décor de départ aléatoire
  nextSceneChange = SCENE_EVERY;
  fromScene = toScene = null;
  transitioning = false;
  transOffset = 0;
  inverted = false;
  flipped = false;
  portal = null;
  portalsSpawned = 0;
  portalsCrossed = 0;
  portalFlashUntil = 0;
  cheatUsed = false;
  paused = false;
  bgScroll = 0;
}

function togglePause() {
  if (state !== 'play') return;       // pause seulement en cours de partie
  paused = !paused;
  pauseBtn.textContent = paused ? '▶' : '⏸';
}

// retour à l'écran d'accueil depuis la pause
function goHome() {
  paused = false;
  pauseBtn.textContent = '⏸';
  state = 'ready';
  showReady();
}

// ---- Menu de personnalisation (t-shirt) ----
const customizeEl = document.getElementById('customize');
const previewCanvas = document.getElementById('preview');
const previewCtx = previewCanvas.getContext('2d');
const shirtOptionsEl = document.getElementById('shirtOptions');

let currentTab = 'shirt';

function drawPreview() {
  previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
  const saved = ctx;
  ctx = previewCtx;                 // drawSquirrel dessine sur le canvas d'aperçu
  ctx.save();
  ctx.translate(previewCanvas.width / 2 - 12, previewCanvas.height / 2 + 6);
  drawSquirrel(20, [150, 92, 50], [38, 24, 14], 0,
    currentShirtColor(), currentHatType(), currentGlassesType(), currentSocksColor());
  ctx.restore();
  ctx = saved;
}

function buildOptions() {
  shirtOptionsEl.innerHTML = '';
  // onglet actif
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === currentTab));

  if (currentTab === 'shirt' || currentTab === 'socks') {
    const list = currentTab === 'shirt' ? SHIRTS : SOCKS;
    const sel = currentTab === 'shirt' ? shirtIndex : socksIndex;
    const key = currentTab === 'shirt' ? 'floppyShirt' : 'floppySocks';
    list.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'swatch' + (s.color ? '' : ' none') + (i === sel ? ' selected' : '');
      el.title = s.name;
      if (s.color) el.style.background = `rgb(${s.color[0]},${s.color[1]},${s.color[2]})`;
      else el.textContent = '∅';
      el.addEventListener('click', () => {
        if (currentTab === 'shirt') shirtIndex = i; else socksIndex = i;
        localStorage.setItem(key, i);
        buildOptions(); drawPreview();
      });
      shirtOptionsEl.appendChild(el);
    });
  } else {
    const list = currentTab === 'hat' ? HATS : GLASSES;
    const sel = currentTab === 'hat' ? hatIndex : glassesIndex;
    list.forEach((o, i) => {
      const el = document.createElement('button');
      el.className = 'optIcon' + (i === sel ? ' selected' : '');
      const cv = document.createElement('canvas');
      cv.width = 48; cv.height = 40;
      renderAccessoryIcon(cv, currentTab, o.type);
      el.appendChild(cv);
      const lbl = document.createElement('span');
      lbl.className = 'optLbl';
      lbl.textContent = o.name;
      el.appendChild(lbl);
      el.addEventListener('click', () => {
        if (currentTab === 'hat') { hatIndex = i; localStorage.setItem('floppyHat', i); }
        else { glassesIndex = i; localStorage.setItem('floppyGlasses', i); }
        buildOptions(); drawPreview();
      });
      shirtOptionsEl.appendChild(el);
    });
  }
}

// Dessine un aperçu de l'accessoire (chapeau ou lunettes) dans un petit canvas
function renderAccessoryIcon(cv, kind, type) {
  const c = cv.getContext('2d');
  c.clearRect(0, 0, cv.width, cv.height);
  if (!type) {
    c.fillStyle = '#ccc';
    c.font = '20px Segoe UI, Arial';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText('∅', cv.width / 2, cv.height / 2);
    return;
  }
  const saved = ctx;
  ctx = c;
  ctx.save();
  const r = 13;
  if (kind === 'hat') {
    ctx.translate(cv.width / 2 - 1.35 * r, cv.height * 0.92 + 0.95 * r);
    drawHat(r, type);
  } else {
    ctx.translate(cv.width / 2 - 1.65 * r, cv.height / 2 + 0.42 * r);
    drawGlasses(r, type);
  }
  ctx.restore();
  ctx = saved;
}

function openCustomize() {
  overlay.classList.add('hidden');
  customizeEl.classList.remove('hidden');
  buildOptions();
  drawPreview();
}

document.querySelectorAll('.tab').forEach(t =>
  t.addEventListener('click', () => { currentTab = t.dataset.tab; buildOptions(); }));

function closeCustomize() {
  customizeEl.classList.add('hidden');
  showReady();
}
document.getElementById('closeCustomize').addEventListener('click', closeCustomize);

function spawnPipe() {
  // tous les 75 points, ce créneau de colonne devient un PORTAIL (pas de pilier ni d'item).
  // On n'en fait apparaître un nouveau qu'une fois le précédent franchi.
  if (portalsSpawned === portalsCrossed &&
      score >= INVERT_AT + portalsSpawned * PORTAL_EVERY) {
    portal = { x: W + PIPE_W / 2 };
    portalsSpawned++;
    return;
  }
  const margin = 60;
  const top = margin + Math.random() * (GROUND_Y - PIPE_GAP - margin * 2);
  pipes.push({ x: W, top, passed: false, hitTop: false, hitBot: false, seed: Math.random() * 100, decor: scene });
  pipeCount++;
  // tous les 10 tuyaux : un petit oiseau à attraper, centré dans l'espace du tuyau
  if (pipeCount % 10 === 0) {
    const col = SMALL_PALETTE[smallColorIdx % SMALL_PALETTE.length];
    smallColorIdx++;
    freeBirds.push({
      x: W + PIPE_W / 2,
      y: top + PIPE_GAP / 2,
      baseY: top + PIPE_GAP / 2,
      phase: Math.random() * Math.PI * 2,
      body: col.body,
      stroke: col.stroke
    });
  }
  // item entre les colonnes (hors tuyaux à écureuil) : un seul à la fois
  if (pipeCount % 10 !== 0) {
    const itemY = top + PIPE_GAP * (0.3 + Math.random() * 0.4);
    spawnItemAt(W + PIPE_W / 2, itemY);
  }
}

// items (champignon / burger / bouclier) à une position donnée — partagé par les deux modes
function spawnItemAt(x, y) {
  if (Math.random() < 0.06) {
    mushrooms.push({ x, baseY: y, phase: Math.random() * Math.PI * 2 });
  } else if (Math.random() < 0.035) {
    weights.push({ x, baseY: y, phase: Math.random() * Math.PI * 2 });
  } else if (Math.random() < 0.03) {
    shields.push({ x, baseY: y, phase: Math.random() * Math.PI * 2 });
  }
}

// MODE OBJETS : une vague de renards à éviter (+ écureuil/item dans un créneau LIBRE distinct)
function spawnObject() {
  objectCount++;
  const slots = 5, margin = 50;
  const usable = GROUND_Y - margin * 2;
  const slotY = i => margin + i * (usable / (slots - 1));
  // créneaux mélangés (pour ne pas spawner renards et items au même endroit)
  const idx = [0, 1, 2, 3, 4];
  for (let i = idx.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [idx[i], idx[j]] = [idx[j], idx[i]];
  }
  // nombre de renards : +1 tous les 50 points (max 3), laisse toujours des créneaux libres
  const foxN = Math.min(3, 1 + Math.floor(score / 50));
  for (let k = 0; k < foxN; k++) {
    const y = slotY(idx[k]) + (Math.random() - 0.5) * 18;
    objects.push({ x: W + 24, y, r: 15 + Math.random() * 7, passed: false, rot: Math.random() * 6.28, spin: (Math.random() - 0.5) * 0.18 });
  }
  // écureuil / item dans un créneau libre restant (jamais sur un renard)
  const cy = slotY(idx[foxN]);
  if (objectCount % 4 === 0) {
    const col = SMALL_PALETTE[smallColorIdx % SMALL_PALETTE.length];
    smallColorIdx++;
    freeBirds.push({ x: W + 24, y: cy, baseY: cy, phase: Math.random() * Math.PI * 2, body: col.body, stroke: col.stroke });
  } else if (Math.random() < 0.12) {
    bats.push({ x: W + 24, baseY: cy, phase: Math.random() * Math.PI * 2 });
  } else {
    spawnItemAt(W + 24, cy);
  }
}

function flap() {
  // démarre l'audio + la musique à la première interaction
  initAudio();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (soundOn && !musicTimer) startMusic();
  if (paused) return;                  // pas de saut quand le jeu est en pause
  if (state === 'dead') {
    // verrou : on ne peut pas rejouer pendant 1 s après la mort
    if (Date.now() - deadAt < DEAD_LOCK) return;
    startCountdown();
  } else if (state === 'ready') {
    // le clic lance le compte à rebours ; la partie démarre après le délai
    startCountdown();
  } else if (state === 'countdown') {
    // on ignore les clics pendant l'attente
    return;
  } else if (state === 'play') {
    bird.vy = FLAP;
    if (birdScale > 1) sfxFart(); else sfxFlap();   // pet sous effet burger

    // chaque saut fait rétrécir l'écureuil jusqu'à sa taille normale
    if (birdScale > 1) birdScale = Math.max(1, birdScale - SHRINK_PER_FLAP);
  }
}

function startCountdown() {
  reset();
  state = 'countdown';
  countdownStart = Date.now();
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h1>Prêt ?</h1>
    <div class="big" id="countNum">3</div>
    <p>La partie démarre…</p>`;
}

function showReady() {
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h1>🐿️ Floppy Squirrel</h1>
    <p>Clique ou appuie sur <b>Espace</b> pour planer</p>
    <p>Choisis un mode :</p>
    <div id="modeRow">
      <button id="modeClassic">🪵 Colonnes<br><small>🏆 ${bestClassic}</small></button>
      <button id="modeObjects">🦊 Chasse aux renards<br><small>🏆 ${bestDodge}</small></button>
    </div>
    <button id="customizeBtn">👕 Personnaliser</button>`;
  const cb = document.getElementById('customizeBtn');
  const openCust = (e) => { e.preventDefault(); e.stopPropagation(); openCustomize(); };
  cb.addEventListener('mousedown', openCust);
  cb.addEventListener('touchstart', openCust, { passive: false });

  const startWith = (mode) => (e) => { e.preventDefault(); e.stopPropagation(); gameMode = mode; startCountdown(); };
  ['modeClassic', 'modeObjects'].forEach(id => {
    const m = id === 'modeClassic' ? 'classic' : 'dodge';
    const btn = document.getElementById(id);
    btn.addEventListener('mousedown', startWith(m));
    btn.addEventListener('touchstart', startWith(m), { passive: false });
  });
